# NATS JetStream node for dream, parsing, indexing, and workflow events.
server_name: agentatlas-nats
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 10GB
}

# Transport security (GA Task 13A): mTLS for the NATS link. Off by default
# (matching the compose stack's ATLAS_TLS_MODE=off default and this
# service's plaintext "nats://nats:4222" ATLAS_NATS_URL) — uncomment once
# cert material exists at these paths (mounted from the same
# agentatlas_tls volume every atlas-* service reads;
# [enterprise] `atlasctl certificates bootstrap` writes exactly this
# certs/nats/{tls.crt,tls.key,ca.crt} layout). `verify: true` requires and
# verifies a client certificate against ca_file for every connection
# (AgentAtlas's own NATS client presents one whenever
# ATLAS_TLS_NATS_MODE=mtls — see internal/tasks/runner.go).
#
# tls {
#   cert_file: "/run/secrets/agentatlas_tls/nats/tls.crt"
#   key_file: "/run/secrets/agentatlas_tls/nats/tls.key"
#   ca_file: "/run/secrets/agentatlas_tls/nats/ca.crt"
#   verify: true
#   verify_and_map: false
# }
