name: agentatlas

# Production-standard stack: the SAME components run in development,
# integration tests, POC, SaaS-like and private-like validation.
# No SQLite / in-memory queue / vector-only store substitutes.

x-atlas-env: &atlas-env
  ATLAS_POSTGRES_DSN: postgres://atlas:${POSTGRES_PASSWORD:-atlas}@postgres:5432/agentatlas?sslmode=disable
  ATLAS_OPENSEARCH_ADDRESSES: http://opensearch:9200
  ATLAS_NATS_URL: nats://nats:4222
  ATLAS_OBJECT_ENDPOINT: http://minio:9000
  ATLAS_OBJECT_BUCKET: agentatlas
  ATLAS_OBJECT_ACCESS_KEY: ${MINIO_ROOT_USER:-atlas}
  ATLAS_OBJECT_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-atlas-secret-key}
  # Model access. There is deliberately NO default endpoint here: the previous
  # one (host.docker.internal:8000/v1) resolves to nothing in this stack, so it
  # did not satisfy the requirement, it hid it — the services started, reported
  # healthy, and failed at the first model call instead of at boot. Left unset,
  # the services start and report ready=false at /healthz naming this variable,
  # which is the answer an operator can act on.
  ATLAS_LLMROUTER_BASE_URL: ${LLMROUTER_BASE_URL:-}
  ATLAS_LLMROUTER_API_KEY: ${LLMROUTER_API_KEY:-}
  ATLAS_NEXUS_BASE_URL: ${NEXUS_BASE_URL:-http://host.docker.internal:8100}
  ATLAS_NEXUS_CLIENT_ID: agentatlas
  ATLAS_NEXUS_SERVICE_SECRET_FILE: /run/secrets/agentatlas_agentnexus_service_secret
  # The approval AUTHORITY is a deployment fact, not a secret: AgentAtlas
  # authors approval plans and AgentNexus transmits them to this system,
  # which decides. Neither product substitutes for it.
  ATLAS_APPROVAL_AUTHORITY: ${ATLAS_APPROVAL_AUTHORITY:?set the customer OA/BPM approval authority identifier}
  ATLAS_NEXUS_BROWSER_CLIENT_ID: agentatlas
  ATLAS_NEXUS_BROWSER_CLIENT_SECRET_FILE: /run/secrets/agentatlas_browser_client_secret
  ATLAS_BROWSER_SESSION_ENCRYPTION_KEY_ID: ${ATLAS_BROWSER_SESSION_ENCRYPTION_KEY_ID:-current}
  ATLAS_BROWSER_SESSION_ENCRYPTION_KEY_FILE: /run/secrets/agentatlas_browser_session_key
  ATLAS_PUBLIC_URL: ${ATLAS_PUBLIC_URL:-https://localhost:8081}
  ATLAS_DOCLING_URL: http://docling-sidecar:5001
  ATLAS_MINERU_URL: http://mineru-sidecar:8000
  ATLAS_ASR_URL: http://asr-sidecar:5003
  ATLAS_VIDEO_URL: http://video-sidecar:5004
  # Transport security (GA Task 13A). Every link defaults to
  # ATLAS_TLS_MODE=off (backward-compatible plaintext, matching every port
  # below unchanged). Set ATLAS_TLS_MODE to "mtls" (the recommended secure
  # production posture) or "tls" to activate every link at once on the SAME
  # ports listed below (a service's listener serves TLS instead of
  # plaintext on its existing port when enabled — no separate secure port);
  # each link's own ATLAS_TLS_<LINK>_MODE still overrides individually.
  # Cert/key/trust-bundle files are expected at the paths below, inside the
  # bind-mounted ATLAS_TLS_MATERIAL_DIR_SOURCE — populated by running
  # [enterprise] `atlasctl certificates bootstrap` (it writes exactly this
  # <slug>/{tls.crt,tls.key,ca.crt} + revoked.txt layout). Standing up a
  # live TLS'd instance of this compose stack is deferred to Task 16A; this
  # file only adds the configuration surface, validated here by static
  # `docker compose config` rendering.
  ATLAS_TLS_MODE: ${ATLAS_TLS_MODE:-off}
  ATLAS_TLS_AGENTATLAS_CERT_FILE: /run/secrets/agentatlas_tls/agentatlas/tls.crt
  ATLAS_TLS_AGENTATLAS_KEY_FILE: /run/secrets/agentatlas_tls/agentatlas/tls.key
  ATLAS_TLS_AGENTATLAS_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/agentatlas/ca.crt
  ATLAS_TLS_AGENTATLAS_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_AGENTATLAS_SERVER_NAME: caller.agentatlas.internal
  ATLAS_TLS_AGENTATLAS_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/caller-of-agentatlas
  ATLAS_TLS_GATEWAY_CERT_FILE: /run/secrets/agentatlas_tls/gateway/tls.crt
  ATLAS_TLS_GATEWAY_KEY_FILE: /run/secrets/agentatlas_tls/gateway/tls.key
  ATLAS_TLS_GATEWAY_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/gateway/ca.crt
  ATLAS_TLS_GATEWAY_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_GATEWAY_SERVER_NAME: caller.gateway.internal
  ATLAS_TLS_GATEWAY_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/caller-of-gateway
  ATLAS_TLS_AGENTNEXUS_CERT_FILE: /run/secrets/agentatlas_tls/agentnexus/tls.crt
  ATLAS_TLS_AGENTNEXUS_KEY_FILE: /run/secrets/agentatlas_tls/agentnexus/tls.key
  ATLAS_TLS_AGENTNEXUS_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/agentnexus/ca.crt
  ATLAS_TLS_AGENTNEXUS_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_AGENTNEXUS_SERVER_NAME: agentnexus.internal
  ATLAS_TLS_AGENTNEXUS_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/agentnexus
  ATLAS_TLS_LLMROUTER_CERT_FILE: /run/secrets/agentatlas_tls/llmrouter/tls.crt
  ATLAS_TLS_LLMROUTER_KEY_FILE: /run/secrets/agentatlas_tls/llmrouter/tls.key
  ATLAS_TLS_LLMROUTER_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/llmrouter/ca.crt
  ATLAS_TLS_LLMROUTER_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_LLMROUTER_SERVER_NAME: llmrouter.internal
  ATLAS_TLS_LLMROUTER_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/llmrouter
  ATLAS_TLS_POSTGRES_CERT_FILE: /run/secrets/agentatlas_tls/postgresql/tls.crt
  ATLAS_TLS_POSTGRES_KEY_FILE: /run/secrets/agentatlas_tls/postgresql/tls.key
  ATLAS_TLS_POSTGRES_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/postgresql/ca.crt
  ATLAS_TLS_POSTGRES_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_POSTGRES_SERVER_NAME: postgresql.internal
  ATLAS_TLS_POSTGRES_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/postgresql
  ATLAS_TLS_OPENSEARCH_CERT_FILE: /run/secrets/agentatlas_tls/opensearch/tls.crt
  ATLAS_TLS_OPENSEARCH_KEY_FILE: /run/secrets/agentatlas_tls/opensearch/tls.key
  ATLAS_TLS_OPENSEARCH_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/opensearch/ca.crt
  ATLAS_TLS_OPENSEARCH_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_OPENSEARCH_SERVER_NAME: opensearch.internal
  ATLAS_TLS_OPENSEARCH_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/opensearch
  ATLAS_TLS_NATS_CERT_FILE: /run/secrets/agentatlas_tls/nats/tls.crt
  ATLAS_TLS_NATS_KEY_FILE: /run/secrets/agentatlas_tls/nats/tls.key
  ATLAS_TLS_NATS_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/nats/ca.crt
  ATLAS_TLS_NATS_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_NATS_SERVER_NAME: nats.internal
  ATLAS_TLS_NATS_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/nats
  ATLAS_TLS_OBJECT_STORAGE_CERT_FILE: /run/secrets/agentatlas_tls/object-storage/tls.crt
  ATLAS_TLS_OBJECT_STORAGE_KEY_FILE: /run/secrets/agentatlas_tls/object-storage/tls.key
  ATLAS_TLS_OBJECT_STORAGE_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/object-storage/ca.crt
  ATLAS_TLS_OBJECT_STORAGE_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_OBJECT_STORAGE_SERVER_NAME: object-storage.internal
  ATLAS_TLS_OBJECT_STORAGE_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/object-storage
  ATLAS_TLS_PARSER_CERT_FILE: /run/secrets/agentatlas_tls/parser/tls.crt
  ATLAS_TLS_PARSER_KEY_FILE: /run/secrets/agentatlas_tls/parser/tls.key
  ATLAS_TLS_PARSER_TRUST_BUNDLE_FILE: /run/secrets/agentatlas_tls/parser/ca.crt
  ATLAS_TLS_PARSER_REVOCATION_FILE: /run/secrets/agentatlas_tls/revoked.txt
  ATLAS_TLS_PARSER_SERVER_NAME: parser.internal
  ATLAS_TLS_PARSER_SPIFFE_ID: spiffe://agentatlas.internal/ns/prod/sa/parser

x-atlas-tls-volume: &atlas-tls-volume
  - ${ATLAS_TLS_MATERIAL_DIR_SOURCE:-./tls}:/run/secrets/agentatlas_tls:ro

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
      POSTGRES_DB: agentatlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d agentatlas"]
      interval: 5s
      timeout: 3s
      retries: 12

  opensearch:
    build:
      context: ./opensearch
      args:
        OPENSEARCH_VERSION: ${OPENSEARCH_VERSION:-3.7.0}
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      # Same 9200 serves TLS once opensearch.yml's commented
      # plugins.security.ssl.* block (GA Task 13A) is enabled — no
      # separate secure port.
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
      - ${ATLAS_TLS_MATERIAL_DIR_SOURCE:-./tls}:/run/secrets/agentatlas_tls:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  nats:
    image: ${NATS_IMAGE:-nats:2.11-alpine}
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      # Same 4222 serves TLS once nats.conf's commented `tls { ... }` block
      # (GA Task 13A) is enabled — no separate secure port.
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - natsdata:/data/jetstream
      - ${ATLAS_TLS_MATERIAL_DIR_SOURCE:-./tls}:/run/secrets/agentatlas_tls:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: ${MINIO_IMAGE:-minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-atlas}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-atlas-secret-key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio-init:
    image: ${MC_IMAGE:-minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-atlas} ${MINIO_ROOT_PASSWORD:-atlas-secret-key} &&
      mc mb -p local/agentatlas || true
      "

  atlas-api:
    build:
      context: ../../../..
      dockerfile: services/agentatlas/deploy/docker/Dockerfile
      args:
        SERVICE: atlas-api
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    secrets:
      - agentatlas_agentnexus_service_secret
    volumes: *atlas-tls-volume
    ports:
      # Serves TLS on this SAME port instead of plaintext once
      # ATLAS_TLS_AGENTATLAS_MODE (or the global ATLAS_TLS_MODE) is set.
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy

  atlas-agent:
    build:
      context: ../../../..
      dockerfile: services/agentatlas/deploy/docker/Dockerfile
      args:
        SERVICE: atlas-agent
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    secrets:
      - agentatlas_agentnexus_service_secret
      - agentatlas_browser_client_secret
      - agentatlas_browser_session_key
    volumes: *atlas-tls-volume
    ports:
      # Serves TLS on this SAME port instead of plaintext once
      # ATLAS_TLS_AGENTATLAS_MODE (or the global ATLAS_TLS_MODE) is set.
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  atlas-worker:
    build:
      context: ../../../..
      dockerfile: services/agentatlas/deploy/docker/Dockerfile
      args:
        SERVICE: atlas-worker
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
      # comma-separated enterprises whose AgentNexus org-event streams the
      # worker subscribes (space sync); empty disables the subscription.
      ATLAS_ORG_SYNC_ENTERPRISES: ${ATLAS_ORG_SYNC_ENTERPRISES:-}
    secrets:
      - agentatlas_agentnexus_service_secret
    volumes: *atlas-tls-volume
    ports:
      - "9091:9091" # metrics/health listener (plaintext; not a named TLS link)
    healthcheck:
      # /readyz, not /metrics. The worker has no API port, so its metrics
      # listener used to double as the healthcheck — but /metrics answers
      # perfectly on a worker whose AgentNexus org-version subscription is
      # failing 401 on every attempt, which is exactly what this reported as
      # `healthy` for ninety seconds. /readyz answers 503 for that state and
      # says how long it has been failing; /healthz on the same listener stays
      # 200 so the container does not flap.
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy

  parser-gateway:
    build:
      context: ../../../..
      dockerfile: services/agentatlas/deploy/docker/Dockerfile
      args:
        SERVICE: parser-gateway
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    volumes: *atlas-tls-volume
    ports:
      # Serves TLS on this SAME port instead of plaintext once
      # ATLAS_TLS_GATEWAY_MODE (or the global ATLAS_TLS_MODE) is set.
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      minio:
        condition: service_healthy

  docling-sidecar:
    image: ${DOCLING_IMAGE:-ghcr.io/docling-project/docling-serve@sha256:56189f190892cc03a4a5c10ba9e56c421ac2524554aa2d36f0f4bb6564132524}
    environment:
      DOCLING_SERVE_ENABLE_UI: "0"
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:5001/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  mineru-sidecar:
    # No official MinerU registry image exists; built from the official PyPI
    # package to avoid trusting third-party mirrors.
    build:
      context: ../../sidecars/mineru-sidecar
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    command: ["mineru-api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "5002:8000"
    volumes:
      - parser-shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

  asr-sidecar:
    build:
      context: ../../sidecars/asr-sidecar
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
    ports:
      - "5003:5003"
    volumes:
      - parser-shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:5003/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  video-sidecar:
    build:
      context: ../../sidecars/video-sidecar
    ports:
      - "5004:5004"
    volumes:
      - parser-shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:5004/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

secrets:
  agentatlas_agentnexus_service_secret:
    file: ${ATLAS_NEXUS_SERVICE_SECRET_FILE_SOURCE:?set an absolute host path to the AgentNexus service secret file}
  agentatlas_browser_client_secret:
    file: ${ATLAS_NEXUS_BROWSER_CLIENT_SECRET_FILE_SOURCE:?set an absolute host path to the AgentNexus browser client secret file}
  agentatlas_browser_session_key:
    file: ${ATLAS_BROWSER_SESSION_ENCRYPTION_KEY_FILE_SOURCE:?set an absolute host path to the 32-byte Atlas browser session key}
volumes:
  pgdata:
  osdata:
  natsdata:
  miniodata:
  parser-shared:
