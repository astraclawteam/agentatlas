name: agentatlas

# Production-standard stack: the SAME components run in development,
# integration tests, POC, SaaS-like and private-like validation.
# No SQLite / in-memory queue / vector-only store substitutes.

x-atlas-env: &atlas-env
  ATLAS_POSTGRES_DSN: postgres://atlas:${POSTGRES_PASSWORD:-atlas}@postgres:5432/agentatlas?sslmode=disable
  ATLAS_OPENSEARCH_ADDRESSES: http://opensearch:9200
  ATLAS_NATS_URL: nats://nats:4222
  ATLAS_OBJECT_ENDPOINT: http://minio:9000
  ATLAS_OBJECT_BUCKET: agentatlas
  ATLAS_OBJECT_ACCESS_KEY: ${MINIO_ROOT_USER:-atlas}
  ATLAS_OBJECT_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-atlas-secret-key}
  ATLAS_LLMROUTER_BASE_URL: ${LLMROUTER_BASE_URL:-http://host.docker.internal:8000/v1}
  ATLAS_LLMROUTER_API_KEY: ${LLMROUTER_API_KEY:-}
  ATLAS_NEXUS_BASE_URL: ${NEXUS_BASE_URL:-http://host.docker.internal:8100}
  ATLAS_DOCLING_URL: http://docling-sidecar:5001
  ATLAS_MINERU_URL: http://mineru-sidecar:8000
  ATLAS_ASR_URL: http://asr-sidecar:5003
  ATLAS_VIDEO_URL: http://video-sidecar:5004

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
      POSTGRES_DB: agentatlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d agentatlas"]
      interval: 5s
      timeout: 3s
      retries: 12

  opensearch:
    build:
      context: ./opensearch
      args:
        OPENSEARCH_VERSION: ${OPENSEARCH_VERSION:-3.7.0}
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  nats:
    image: ${NATS_IMAGE:-nats:2.11-alpine}
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - natsdata:/data/jetstream
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-atlas}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-atlas-secret-key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio-init:
    image: ${MC_IMAGE:-minio/mc:latest}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-atlas} ${MINIO_ROOT_PASSWORD:-atlas-secret-key} &&
      mc mb -p local/agentatlas || true
      "

  atlas-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: atlas-api
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy

  atlas-agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: atlas-agent
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  atlas-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: atlas-worker
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy

  parser-gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: parser-gateway
        GOPROXY: ${GOPROXY_BUILD:-https://proxy.golang.org,direct}
    environment:
      <<: *atlas-env
    ports:
      - "8090:8090"
    depends_on:
      minio:
        condition: service_healthy

  docling-sidecar:
    image: ${DOCLING_IMAGE:-ghcr.io/docling-project/docling-serve:latest}
    environment:
      DOCLING_SERVE_ENABLE_UI: "0"
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:5001/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  mineru-sidecar:
    # No official MinerU registry image exists; built from the official PyPI
    # package to avoid trusting third-party mirrors.
    build:
      context: ../../sidecars/mineru-sidecar
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    command: ["mineru-api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "5002:8000"
    volumes:
      - parser-shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

  asr-sidecar:
    build:
      context: ../../sidecars/asr-sidecar
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
    ports:
      - "5003:5003"
    volumes:
      - parser-shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:5003/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  video-sidecar:
    build:
      context: ../../sidecars/video-sidecar
    ports:
      - "5004:5004"
    volumes:
      - parser-shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:5004/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  osdata:
  natsdata:
  miniodata:
  parser-shared:
