apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-atlas-api
  labels:
    app.kubernetes.io/name: agentatlas
    app.kubernetes.io/component: atlas-api
spec:
  replicas: {{ .Values.services.atlasApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentatlas
      app.kubernetes.io/component: atlas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentatlas
        app.kubernetes.io/component: atlas-api
    spec:
      containers:
        - name: atlas-api
          image: {{ include "agentatlas.image" (dict "root" . "service" "atlas-api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            # Serves TLS on this SAME port instead of plaintext once
            # .Values.tls.enabled (GA Task 13A) — no separate secure port.
            - containerPort: {{ .Values.services.atlasApi.port }}
          env:
            {{- include "agentatlas.env" . | nindent 12 }}
            {{- if .Values.tls.enabled }}
            - name: ATLAS_TLS_MODE
              value: {{ .Values.tls.mode | quote }}
            {{- range .Values.tls.links }}
            - name: ATLAS_TLS_{{ .envPrefix }}_CERT_FILE
              value: {{ printf "/var/run/secrets/agentatlas-tls/%s/tls.crt" .slug }}
            - name: ATLAS_TLS_{{ .envPrefix }}_KEY_FILE
              value: {{ printf "/var/run/secrets/agentatlas-tls/%s/tls.key" .slug }}
            - name: ATLAS_TLS_{{ .envPrefix }}_TRUST_BUNDLE_FILE
              value: {{ printf "/var/run/secrets/agentatlas-tls/%s/ca.crt" .slug }}
            - name: ATLAS_TLS_{{ .envPrefix }}_REVOCATION_FILE
              value: /var/run/secrets/agentatlas-tls/revoked.txt
            - name: ATLAS_TLS_{{ .envPrefix }}_SERVER_NAME
              value: {{ .serverName | quote }}
            - name: ATLAS_TLS_{{ .envPrefix }}_SPIFFE_ID
              value: {{ .spiffeId | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- include "agentatlas.nexusSecretVolumeMount" . | nindent 12 }}
            {{- if .Values.tls.enabled }}
            - name: agentatlas-tls
              mountPath: /var/run/secrets/agentatlas-tls
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.services.atlasApi.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.services.atlasApi.port }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.atlasApi | nindent 12 }}
      volumes:
        {{- include "agentatlas.nexusSecretVolume" . | nindent 8 }}
        {{- if .Values.tls.enabled }}
        - name: agentatlas-tls
          secret:
            secretName: {{ .Values.tls.secretName | quote }}
            items:
              {{- range .Values.tls.links }}
              - key: {{ printf "%s-tls-crt" .slug }}
                path: {{ printf "%s/tls.crt" .slug }}
                mode: 0400
              - key: {{ printf "%s-tls-key" .slug }}
                path: {{ printf "%s/tls.key" .slug }}
                mode: 0400
              - key: {{ printf "%s-ca-crt" .slug }}
                path: {{ printf "%s/ca.crt" .slug }}
                mode: 0400
              {{- end }}
              - key: revoked-txt
                path: revoked.txt
                mode: 0400
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-atlas-api
  labels:
    app.kubernetes.io/name: agentatlas
    app.kubernetes.io/component: atlas-api
spec:
  selector:
    app.kubernetes.io/name: agentatlas
    app.kubernetes.io/component: atlas-api
  ports:
    - port: {{ .Values.services.atlasApi.port }}
      targetPort: {{ .Values.services.atlasApi.port }}
