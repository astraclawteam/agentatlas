apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-atlas-agent
  labels:
    app.kubernetes.io/name: agentatlas
    app.kubernetes.io/component: atlas-agent
spec:
  replicas: {{ .Values.services.atlasAgent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentatlas
      app.kubernetes.io/component: atlas-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentatlas
        app.kubernetes.io/component: atlas-agent
    spec:
      containers:
        - name: atlas-agent
          image: {{ include "agentatlas.image" (dict "root" . "service" "atlas-agent") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.atlasAgent.port }}
          env:
            {{- include "agentatlas.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.atlasAgent | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-atlas-agent
  labels:
    app.kubernetes.io/name: agentatlas
    app.kubernetes.io/component: atlas-agent
spec:
  selector:
    app.kubernetes.io/name: agentatlas
    app.kubernetes.io/component: atlas-agent
  ports:
    - port: {{ .Values.services.atlasAgent.port }}
      targetPort: {{ .Values.services.atlasAgent.port }}
