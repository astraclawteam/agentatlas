openapi: 3.0.3
info:
  title: AgentNexus Client Contract
  version: 0.1.0
  description: >
    AgentAtlas defines here the exact AgentNexus surface it consumes: ticket
    verification, evidence location, authorized evidence reads, audit evidence
    append, and org graph event subscription. AgentNexus remains the authority;
    the audit append subset is parity-tested against a frozen published
    AgentNexus contract snapshot. AgentAtlas ships a mock server implementing
    this client contract for local development and integration tests.
paths:
  /v1/authorization/decisions:
    post:
      operationId: authorizeGovernanceOperation
      summary: Authorize a browser Bearer or original CaseTicket-bound governance operation.
      security: [{agentAtlasServiceSecret: []}, {browserAccessToken: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/GovernanceAuthorizationRequest'}}}
      responses:
        '200': {description: Authoritative decision, content: {application/json: {schema: {$ref: '#/components/schemas/GovernanceAuthorizationDecision'}}}}
        '401': {description: Invalid service, Bearer, or CaseTicket credential.}
        '403': {description: Ticket or actor is not bound to the requested operation.}
  # Approval RESOLUTION is retired: AgentNexus no longer chooses approvers.
  # AgentAtlas authors the plan and AgentNexus transmits it to the deployment
  # approval authority (the customer OA/BPM system), which decides and attests.
  /v1/approvals/transmissions:
    post:
      operationId: transmitApprovalPlan
      summary: Transmit a caller-authored approval plan to the approval authority.
      security: [{agentAtlasServiceSecret: []}, {browserAccessToken: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ApprovalRequest'}}}
      responses:
        '202': {description: Transport status of the transmitted plan; never a decision., content: {application/json: {schema: {$ref: '#/components/schemas/ApprovalTransmissionStatus'}}}}
  /v1/approvals/transmissions/{plan_ref}:
    get:
      operationId: getApprovalTransmission
      summary: Read the transmission status of one approval plan.
      security: [{agentAtlasServiceSecret: []}, {browserAccessToken: []}]
      parameters:
        - {name: plan_ref, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Transmission status. Carries the authority decision when one exists, and by boundary no approver identity., content: {application/json: {schema: {$ref: '#/components/schemas/ApprovalTransmissionStatus'}}}}
        '404': {description: No transmission exists under this plan_ref for the verified tenant.}
  /v1/tickets/verify:
    post:
      operationId: verifyTicket
      summary: Verify an access ticket and resolve its actor context
      security: [{agentAtlasServiceSecret: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id]
              properties:
                ticket_id: { type: string }
      responses:
        '200':
          description: Verification result (valid=false is a 200, not an error)
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid: { type: boolean }
                  enterprise_id: { type: string }
                  actor_user_id: { type: string }
                  scopes:
                    type: array
                    items: { type: string }
                  org_version: {type: integer, minimum: 1}
                  org_unit_ids: {type: array, items: {type: string}}
                  resource_type: {type: string}
                  resource_id: {type: string}
                  allowed_actions: {type: array, items: {type: string}}
                  review_mode: {type: string}
                  queue: {type: string}
                  expires_at: { type: string, format: date-time }
  /v1/runtime/locate:
    post:
      operationId: locateRuntimeEvidence
      summary: Resolve an evidence pointer or query intent to a readable location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id, enterprise_id]
              properties:
                ticket_id: { type: string }
                enterprise_id: { type: string }
                evidence_pointer_id: { type: string }
                resource_uri: { type: string }
                query_intent: { type: string }
      responses:
        '200':
          description: Location resolved
          content:
            application/json:
              schema:
                type: object
                required: [resource_uri, source_system]
                properties:
                  resource_uri: { type: string }
                  source_system: { type: string }
                  location_hints: { type: object }
        '403':
          description: Ticket lacks scope for this resource
  /v1/runtime/read:
    post:
      operationId: readRuntimeEvidence
      summary: Read an authorized, sanitized evidence excerpt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id, enterprise_id, resource_uri]
              properties:
                ticket_id: { type: string }
                enterprise_id: { type: string }
                resource_uri: { type: string }
                evidence_pointer_id: { type: string }
                max_bytes: { type: integer, default: 65536 }
      responses:
        '200':
          description: Excerpt returned under a step grant
          content:
            application/json:
              schema:
                type: object
                required: [grant_id, content_type, sanitized_excerpt, content_hash]
                properties:
                  grant_id: { type: string }
                  content_type: { type: string }
                  sanitized_excerpt: { type: string }
                  content_hash: { type: string }
        '403':
          description: Read denied; AgentAtlas must fail closed
  /v1/audit/evidence:
    post:
      operationId: appendAuditEvidence
      summary: Record a trusted AgentAtlas service request in the audit chain.
      security: [{agentAtlasServiceSecret: []}, {browserAccessToken: []}]
      parameters:
        - {name: Idempotency-Key, in: header, required: false, schema: {type: string, minLength: 16, maxLength: 128}, description: Stable operation-derived key; retries with the same canonical payload return the same audit_ref_id.}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuditEvidenceRequest'}
      responses:
        '201':
          description: Audit reference created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuditEvidenceResponse'}
        '400': {description: Invalid action, resource binding, or bounded details.}
        '401': {description: Invalid service credentials or Case Ticket.}
        '409': {description: Idempotency-Key was already used with a different canonical audit payload.}
        '503': {description: Ticket or audit persistence unavailable.}
  /v1/actions/request:
    post:
      operationId: requestAction
      summary: Submit a governed ActionRequest and receive an ActionGrant (GA Task 0D).
      description: >
        AgentAtlas sends ONLY the governed ActionRequest — never a
        connector-specific request body, connector endpoint or credential.
        AgentNexus rechecks identity, org, approval, replay and capability
        before granting; the AgentAtlas client additionally rechecks the
        returned ActionGrant (sdk/go/nexus.VerifyActionGrant: exact
        WorkCase/actor/org/capability/parameter-hash binding, one-use,
        non-expiry, replay) before treating it as success.
      security: [{agentAtlasServiceSecret: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ActionRequest'}}}
      responses:
        '200': {description: Action granted., content: {application/json: {schema: {$ref: '#/components/schemas/ActionGrant'}}}}
        '400': {description: Invalid ActionRequest (malformed parameter_hash, missing idempotency key, detached postcondition/verification-need binding, missing expiry).}
        '401': {description: Invalid service credentials.}
        '403': {description: Denied by AgentNexus identity, org, approval, replay or capability enforcement.}
  /v1/actions/receipt:
    post:
      operationId: fetchActionReceipt
      summary: Fetch the signed ActionReceipt for a previously requested Action (GA Task 0D).
      description: >
        ActionReceipt proves technical execution ONLY; it never asserts that
        a WorkCase Goal or business Outcome was achieved. The AgentAtlas
        client rechecks the signature and Action/parameter-hash binding
        (sdk/go/nexus.VerifyActionReceipt) before treating a fetched receipt
        as success.
      security: [{agentAtlasServiceSecret: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ActionReceiptFetchRequest'}}}
      responses:
        '200': {description: Signed ActionReceipt., content: {application/json: {schema: {$ref: '#/components/schemas/ActionReceipt'}}}}
        '401': {description: Invalid service credentials.}
        '404': {description: Unknown action_id, or no receipt issued yet.}
  /v1/actions/observation:
    post:
      operationId: fetchObservationReceipt
      summary: Fetch the signed ObservationReceipt confirming one VerificationNeed for a previously requested Action (GA Task 0D).
      description: >
        ObservationReceipt proves one bounded, source-authoritative
        post-action observation; it never asserts that a WorkCase Goal or
        business Outcome was achieved. NOT part of AgentNexus's frozen v1
        contract candidate (agentnexus@73ed5a7e83d0804673e3191cf79cc22699f41b3f)
        — implemented against the cross-product agreed spec pending
        AgentNexus's own freeze; see evidence/2026.2-lts/ga-task-0d/notes.md.
        The AgentAtlas client rejects a receipt detached from its Action or
        PostconditionSpec (sdk/go/nexus.VerifyObservationReceipt) before
        treating a fetched observation as success.
      security: [{agentAtlasServiceSecret: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ObservationReceiptFetchRequest'}}}
      responses:
        '200': {description: Signed ObservationReceipt., content: {application/json: {schema: {$ref: '#/components/schemas/ObservationReceipt'}}}}
        '401': {description: Invalid service credentials.}
        '404': {description: Unknown action_id/verification_need_id, or no observation issued yet.}
  /v1/org-events:
    get:
      operationId: subscribeOrgEvents
      summary: Subscribe to org graph change events (SSE)
      description: >
        Server-Sent Events stream. Each event data payload is an OrgEvent JSON
        object. Clients resume with since_version. AgentAtlas keeps only the
        org_snapshot/org_version cache it needs for space sync and audit.
      parameters:
        - { name: enterprise_id, in: query, required: true, schema: { type: string } }
        - { name: since_version, in: query, schema: { type: integer } }
      responses:
        '200':
          description: SSE stream of OrgEvent
          content:
            text/event-stream:
              schema: { type: string }
components:
  securitySchemes:
    agentAtlasServiceSecret:
      type: http
      scheme: basic
      description: AgentAtlas service credentials using client_id=agentatlas and its confidential client secret.
    browserAccessToken:
      type: http
      scheme: bearer
      description: Opaque AgentAtlas BFF token bound to client, audience, enterprise, user, and browser session.
  schemas:
    ApprovalRequest:
      type: object
      required: [request_id, business_context_ref, capability, parameter_hash, purpose, plan, expires_at]
      properties:
        request_id: {type: string}
        trace_id: {type: string}
        business_context_ref: {type: string}
        capability: {type: string}
        parameter_hash: {type: string}
        purpose: {type: string}
        plan:
          type: object
          required: [plan_ref, plan_hash, authority]
          properties:
            plan_ref: {type: string}
            plan_hash: {type: string}
            authority: {type: string, description: The deployment approval authority. AgentNexus transmits to it and never substitutes for it.}
        expires_at: {type: string, format: date-time}
    ApprovalTransmissionStatus:
      type: object
      description: >-
        Transport diagnostics of one transmitted plan. Status is monotonic and
        carries no grant state. No approver identity appears here by boundary:
        who inside the authority decided is that system record, not a field
        that crosses this contract.
      required: [plan_ref, plan_hash, authority, business_context_ref, capability, parameter_hash, status, expires_at, delivery_attempts, updated_at]
      properties:
        plan_ref: {type: string}
        plan_hash: {type: string}
        authority: {type: string}
        business_context_ref: {type: string}
        capability: {type: string}
        parameter_hash: {type: string}
        status: {type: string, enum: [pending, delivered, evidence_recorded, revoked]}
        expires_at: {type: string, format: date-time}
        delivery_attempts: {type: integer, minimum: 0}
        last_delivery_state: {type: string, enum: [delivered, failed]}
        decision: {type: string, enum: [approved, denied, narrowed]}
        decided_at: {type: string, format: date-time}
        revoked_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    GovernanceAuthorizationRequest:
      type: object
      additionalProperties: false
      required: [org_unit_id, org_version, resource_type, resource_id, action]
      properties:
        ticket_id: {type: string, description: Required with AgentAtlas service credentials and omitted with browser Bearer authentication.}
        org_unit_id: {type: string}
        org_version: {type: integer, minimum: 1}
        resource_type: {type: string, enum: [knowledge, workflow]}
        resource_id: {type: string}
        action: {type: string}
        review_mode: {type: string, enum: [single_confirmation, upward_review, enterprise_knowledge_admin_queue]}
        queue: {type: string}
    GovernanceAuthorizationDecision:
      type: object
      required: [decision, permissions, org_version, org_unit_ids, risk_level]
      properties:
        decision: {type: string, enum: [allow, deny]}
        permissions: {type: array, items: {type: string}}
        org_version: {type: integer, minimum: 1}
        org_unit_ids: {type: array, items: {type: string}}
        risk_level: {type: string}
    AuditEvidenceAction:
      type: string
      enum:
        - workflow_draft_created
        - workflow_version_published
        - dream_policy_created
        - dream_policy_create_requested
        - dream_job_run
        - retrieval_plan_created
        - evidence_located
        - evidence_read
        - answer_trace_created
        - sensitive_artifact_parsed
        - visibility_rule_changed
        - governance_change_decided
    AuditEvidenceRequest:
      type: object
      additionalProperties: false
      required: [enterprise_id, action, resource_type, resource_id]
      properties:
        ticket_id: {type: string, minLength: 0, maxLength: 4096, description: Required and verified for AgentAtlas service Basic authentication; omit or send an empty string for a browserAccessToken actor. A non-empty Bearer ticket must resolve to the same enterprise user.}
        enterprise_id: {type: string, minLength: 1, maxLength: 128}
        action: {$ref: '#/components/schemas/AuditEvidenceAction'}
        resource_type: {type: string, minLength: 1, maxLength: 64}
        resource_id: {type: string, minLength: 1, maxLength: 128, description: Preallocated resource identifier bound into the audit lineage.}
        trace_id: {type: string, maxLength: 128}
        details: {type: object, maxProperties: 100, additionalProperties: true, description: Keys are at most 128 Unicode code points; string values at most 1024; arrays/maps at most 100 entries; nesting depth at most 4.}
        org_version: {type: integer, minimum: 1, description: Required when binding a scoped CaseTicket operation.}
        org_unit_id: {type: string}
        authorized_action: {type: string, description: Exact permission action authorized by the scoped ticket.}
        review_mode: {type: string, enum: [enterprise_knowledge_admin_queue]}
        queue: {type: string, enum: [enterprise_knowledge_admin]}
      oneOf:
        - properties:
            action: {type: string, enum: [dream_policy_create_requested]}
            resource_type: {type: string, enum: [dream_policy]}
        - properties:
            action:
              type: string
              enum: [workflow_draft_created, workflow_version_published, dream_policy_created, dream_job_run, retrieval_plan_created, evidence_located, evidence_read, answer_trace_created, sensitive_artifact_parsed, visibility_rule_changed]
        - required: [org_version, org_unit_id, authorized_action, review_mode, queue, details]
          properties:
            action: {type: string, enum: [governance_change_decided]}
    AuditEvidenceResponse:
      type: object
      additionalProperties: false
      required: [audit_ref_id]
      properties:
        audit_ref_id: {type: string, minLength: 1}
    OrgEvent:
      type: object
      required: [event_id, enterprise_id, org_version, type, scope, occurred_at]
      properties:
        event_id: { type: string }
        enterprise_id: { type: string }
        org_version: { type: integer }
        type:
          type: string
          enum:
            - employee_upserted
            - employee_removed
            - project_group_upserted
            - project_group_removed
            - department_upserted
            - department_removed
            - business_unit_upserted
            - business_unit_removed
            - company_upserted
        scope:
          type: object
          required: [kind, id, name]
          properties:
            kind: { type: string, enum: [employee, project_group, department, business_unit, company] }
            id: { type: string }
            name: { type: string }
            parent_kind: { type: string, enum: [employee, project_group, department, business_unit, company] }
            parent_id: { type: string }
        members:
          type: array
          items:
            type: object
            required: [user_id]
            properties:
              user_id: { type: string }
              display_name: { type: string }
        occurred_at: { type: string, format: date-time }
    # --- GA Task 0D: governed Action Request/Grant/Receipt protocol -------
    # Mirrors sdk/go/nexus/action.go exactly (same JSON tags). ActionStatus,
    # ActionRequest (minus AgentAtlas's own WorkCase/Goal/Outcome/
    # postcondition/verification-need additions), ActionGrant and
    # ActionReceipt's execution-proof shape are field-compatible with
    # AgentNexus's frozen v1 Action contract candidate, pinned at
    # agentnexus@73ed5a7e83d0804673e3191cf79cc22699f41b3f. PostconditionSpec,
    # VerificationNeed and ObservationReceipt are NOT part of that frozen
    # contract; they are AgentAtlas's implementation of the cross-product
    # AGREED SPEC pending AgentNexus's own freeze/re-pin (see
    # evidence/2026.2-lts/ga-task-0d/notes.md).
    Signature:
      type: object
      additionalProperties: false
      required: [algorithm, key_id, value]
      properties:
        algorithm: {type: string, enum: [ed25519]}
        key_id: {type: string}
        value: {type: string, description: Base64-encoded detached signature bytes.}
    Precondition:
      type: object
      additionalProperties: false
      required: [kind, reference]
      properties:
        kind: {type: string}
        reference: {type: string}
        expected: {type: string}
    VerificationNeed:
      type: object
      additionalProperties: false
      required: [need_id, source, authority]
      properties:
        need_id: {type: string}
        source: {type: string, description: Business-semantic source class — never a connector table, API path or instance selector.}
        authority: {type: string}
        max_age: {type: integer, minimum: 0, description: "Freshness bound in nanoseconds (Go time.Duration wire encoding). 0 or absent means no bound is declared."}
    PostconditionSpec:
      type: object
      additionalProperties: false
      required: [postcondition_id, description, verification_need_id]
      properties:
        postcondition_id: {type: string}
        description: {type: string}
        verification_need_id: {type: string, description: Must reference a need_id declared in the same ActionRequest's verification_needs.}
    ActionRequest:
      type: object
      additionalProperties: false
      required: [action_id, goal_ref, outcome_ref, work_case_id, work_plan_revision, actor, org_scope, capability, parameter_hash, risk, idempotency_key, expires_at, execution_receipt_schema]
      properties:
        action_id: {type: string}
        goal_ref: {type: string, description: Opaque reference into AgentAtlas's Goal graph.}
        outcome_ref: {type: string, description: Opaque reference into AgentAtlas's Outcome graph (Outcome type frozen by GA Task 0G, not this contract).}
        work_case_id: {type: string, description: Mirrors sdk/go/workcase WorkCase.ID.}
        work_plan_revision: {type: integer, minimum: 0, description: Mirrors sdk/go/workcase WorkPlan.Revision.}
        actor: {type: string, description: AgentAtlas-declared identity; AgentNexus independently re-derives trusted identity from verified credentials.}
        org_scope: {type: string}
        capability: {type: string}
        parameter_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        preconditions: {type: array, items: {$ref: '#/components/schemas/Precondition'}}
        postconditions: {type: array, items: {$ref: '#/components/schemas/PostconditionSpec'}}
        verification_needs: {type: array, items: {$ref: '#/components/schemas/VerificationNeed'}}
        risk: {type: string, enum: [low, medium, high]}
        approval_references: {type: array, items: {type: string}, description: Opaque references; AgentNexus transmits but never authors approval plans.}
        idempotency_key: {type: string, minLength: 16, maxLength: 128}
        expires_at: {type: string, format: date-time}
        execution_receipt_schema: {type: string}
        compensation_ref: {type: string}
      description: >
        The ONLY thing that crosses the governed Action boundary toward
        AgentNexus — never a connector-specific request body, connector
        endpoint or credential.
    ActionGrant:
      type: object
      additionalProperties: false
      required: [grant_id, action_id, work_case_id, actor, org_scope, capability, parameter_hash, one_use, issued_at, expires_at]
      properties:
        grant_id: {type: string}
        action_id: {type: string}
        work_case_id: {type: string}
        actor: {type: string}
        org_scope: {type: string}
        capability: {type: string}
        parameter_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        one_use: {type: boolean, enum: [true], description: A step grant is one-use by contract.}
        issued_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
    ActionReceipt:
      type: object
      additionalProperties: false
      required: [receipt_id, action_id, parameter_hash, connector_ref, target_ref, executor_identity, result_code, audit_ref, issued_at]
      properties:
        receipt_id: {type: string}
        action_id: {type: string}
        parameter_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        connector_ref: {type: string, description: Opaque AgentNexus handle — never a connector endpoint or credential.}
        target_ref: {type: string, description: Opaque AgentNexus handle — never a raw enterprise identifier.}
        before_hash: {type: string}
        after_hash: {type: string}
        executor_identity: {type: string}
        result_code: {type: string}
        external_receipt: {type: object, description: Opaque hash-bound payload from the underlying system of record — content only, never a connector-specific body shape AgentAtlas interprets.}
        audit_ref: {type: string}
        issued_at: {type: string, format: date-time}
        signature: {$ref: '#/components/schemas/Signature'}
      description: >
        Proves technical execution ONLY. Never asserts that a WorkCase Goal
        or business Outcome was achieved (sdk/go/nexus
        ActionReceipt.ConfirmsOutcome always fails).
    ObservationReceipt:
      type: object
      additionalProperties: false
      required: [observation_id, action_id, parameter_hash, postcondition_id, verification_need_id, source, authority, observed_at, normalized_observation_hash, evidence_ref, audit_ref]
      properties:
        observation_id: {type: string}
        action_id: {type: string}
        parameter_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        postcondition_id: {type: string}
        verification_need_id: {type: string}
        source: {type: string}
        source_version: {type: string}
        authority: {type: string}
        observed_at: {type: string, format: date-time}
        freshness_window: {type: integer, minimum: 0, description: "Nanoseconds (Go time.Duration wire encoding). 0 or absent means unbounded."}
        normalized_observation_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        evidence_ref: {type: string, description: Opaque reference to the AgentNexus EvidenceHandle this observation is bound to.}
        audit_ref: {type: string}
        signature: {$ref: '#/components/schemas/Signature'}
      description: >
        Proves ONE bounded, source-authoritative post-action observation.
        Never asserts that a WorkCase Goal or business Outcome was achieved.
        NOT part of AgentNexus's frozen v1 contract candidate
        (agentnexus@73ed5a7e83d0804673e3191cf79cc22699f41b3f) — implemented
        against the cross-product agreed spec; see
        evidence/2026.2-lts/ga-task-0d/notes.md.
    ActionReceiptFetchRequest:
      type: object
      additionalProperties: false
      required: [action_id]
      properties:
        action_id: {type: string}
    ObservationReceiptFetchRequest:
      type: object
      additionalProperties: false
      required: [action_id, verification_need_id]
      properties:
        action_id: {type: string}
        verification_need_id: {type: string}
