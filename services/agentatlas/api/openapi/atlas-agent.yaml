openapi: 3.0.3
info:
  title: AgentAtlas Agent Control Plane API
  version: 1.0.0
  description: >
    Agent-first control plane for admins and knowledge owners: Knowledge Agent
    runs, workflow drafts and publication, dream policies, and artifact
    processing jobs. Drafts may be created by the agent; publication always
    requires an explicit human confirmation. Every call authenticates with an
    AgentNexus-issued ticket.
security:
  - NexusTicket: []
paths:
  /v1/agent/runs:
    post:
      operationId: createAgentRun
      summary: Start a Knowledge Agent run from a natural-language goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterprise_id, message]
              properties:
                enterprise_id: { type: string }
                message: { type: string, minLength: 1 }
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      evidence_pointer_id: { type: string }
                      artifact_id: { type: string }
      responses:
        '201':
          description: Run started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/agent/runs/{id}/messages:
    post:
      operationId: postAgentRunMessage
      summary: Continue a Knowledge Agent run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Run advanced
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '404': { $ref: '#/components/responses/NotFound' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, minLength: 1 }
  /v1/agent/runs/{id}/confirmations:
    post:
      operationId: postAgentRunConfirmation
      summary: Resolve a pending human confirmation
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation_id, decision]
              properties:
                confirmation_id: { type: string }
                decision: { type: string, enum: [approve, reject] }
                comment: { type: string }
      responses:
        '200':
          description: Confirmation applied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/workflows:
    post:
      operationId: createWorkflowDraft
      summary: Create a workflow draft (validated against workflow.schema.json)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterprise_id, workflow]
              properties:
                enterprise_id: { type: string }
                workflow:
                  type: object
                  description: Workflow document conforming to schemas/workflow/workflow.schema.json
      responses:
        '201':
          description: Draft stored
          content:
            application/json:
              schema:
                type: object
                required: [workflow_id, draft_version]
                properties:
                  workflow_id: { type: string }
                  draft_version: { type: integer }
        '422':
          description: Schema validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/workflows/{id}/publish:
    post:
      operationId: publishWorkflow
      summary: Publish an immutable workflow version (human-confirmed)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '201':
          description: Version published
          content:
            application/json:
              schema:
                type: object
                required: [workflow_id, version]
                properties:
                  workflow_id: { type: string }
                  version: { type: integer }
        '409':
          description: Draft unchanged since last publish or draft invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/dream-policies:
    post:
      operationId: createDreamPolicy
      summary: Create a dream policy draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DreamPolicyDefinition'
      responses:
        '201':
          description: Policy draft stored
          content:
            application/json:
              schema:
                type: object
                required: [dream_policy_id, status]
                properties:
                  dream_policy_id: { type: string }
                  status: { type: string, enum: [draft] }
    get:
      operationId: listDreamPolicies
      summary: List the enterprise's published dream policies (console policy panel)
      responses:
        '200':
          description: Published policies with decoded definitions
          content:
            application/json:
              schema:
                type: object
                required: [dream_policies]
                properties:
                  dream_policies:
                    type: array
                    items:
                      type: object
                      required: [dream_policy_id, org_scope, status]
                      properties:
                        dream_policy_id: { type: string }
                        org_scope: { type: string }
                        status: { type: string }
                        policy: { $ref: '#/components/schemas/DreamPolicyDefinition' }
  /v1/dream/overview:
    get:
      operationId: getDreamOverview
      summary: List immutable Dream run cards for one authorized organization unit
      parameters:
        - { name: org_unit_id, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: Bounded Dream overview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DreamRunList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/dream/runs:
    get:
      operationId: listDreamRuns
      summary: List immutable Dream runs for one authorized organization unit and optional window end date
      parameters:
        - { name: org_unit_id, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: window, in: query, required: false, schema: { type: string, format: date } }
      responses:
        '200':
          description: Bounded Dream run list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DreamRunList' }
  /v1/dream/runs/{id}:
    get:
      operationId: getDreamRun
      summary: Get one immutable enterprise-bound Dream run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: Dream run
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DreamRunView' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/dream/runs/{id}/annotations:
    post:
      operationId: annotateDreamRun
      summary: Append a governed annotation without changing the immutable Dream output
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [action]
              properties:
                action: { type: string, enum: [confirm, reject, mark_incorrect, comment] }
                comment: { type: string, maxLength: 4000 }
      responses:
        '201': { description: Annotation appended }
        '403': { description: Annotation permission denied }
  /v1/dream/runs/{id}/reruns:
    post:
      operationId: rerunDreamRun
      summary: Create an immutable manual rerun pinned to the original window and versions
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 1, maxLength: 256 } }
      responses:
        '202': { description: Rerun scheduled }
        '409': { description: Canonical idempotency conflict }
  /v1/dream/runs/{id}/evidence-access:
    post:
      operationId: accessDreamEvidence
      summary: Read sanitized sealed detail through a resource-bound AgentNexus Step Grant and mandatory audit
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: Audited, grant-bound sanitized detail
          content:
            application/json:
              schema:
                type: object
                required: [grant_id, audit_ref_id, content_type, sanitized_detail, content_hash]
                properties:
                  grant_id: { type: string }
                  audit_ref_id: { type: string }
                  content_type: { type: string }
                  sanitized_detail: { type: string, maxLength: 100000 }
                  content_hash: { type: string }
        '403': { description: Missing dream:evidence:read or AgentNexus denied the bound read }
  /v1/method-outlines:
    post:
      operationId: createMethodOutline
      summary: Import a method outline (方法大纲 — flexible method structure, indexed for retrieval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, outline]
              properties:
                title: { type: string }
                outline: { type: object, description: Sections/steps of arbitrary nesting }
                org_scope: { type: string }
      responses:
        '201':
          description: Outline stored and queued for indexing
          content:
            application/json:
              schema:
                type: object
                required: [method_outline_id, title]
                properties:
                  method_outline_id: { type: string }
                  title: { type: string }
                  org_scope: { type: string }
    get:
      operationId: listMethodOutlines
      summary: List the enterprise's method outlines
      responses:
        '200':
          description: Outlines newest-first
          content:
            application/json:
              schema:
                type: object
                required: [method_outlines]
                properties:
                  method_outlines:
                    type: array
                    items:
                      type: object
                      required: [method_outline_id, title]
                      properties:
                        method_outline_id: { type: string }
                        title: { type: string }
                        org_scope: { type: string }
                        outline: { type: object }
                        created_at: { type: string, format: date-time }
  /v1/workflows/{id}/runs:
    post:
      operationId: startWorkflowRun
      summary: Register a pending run for a published version and enqueue it for atlas-worker
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: integer, minimum: 1 }
                input: { type: object, description: Run input visible to input.* nodes }
      responses:
        '202':
          description: Run registered and enqueued
          content:
            application/json:
              schema:
                type: object
                required: [run_id, status]
                properties:
                  run_id: { type: string }
                  status: { type: string, enum: [pending] }
components:
  securitySchemes:
    NexusTicket:
      type: apiKey
      in: header
      name: X-Nexus-Ticket
  responses:
    Unauthorized:
      description: Missing or invalid ticket (fail closed)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found in caller-visible scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    DreamRunList:
      type: object
      additionalProperties: false
      required: [runs]
      properties:
        runs:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/DreamRunView' }
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    AgentRun:
      type: object
      required: [run_id, enterprise_id, status]
      properties:
        run_id: { type: string }
        enterprise_id: { type: string }
        status: { type: string, enum: [running, waiting_confirmation, completed, failed] }
        reply: { type: string }
        pending_confirmation:
          type: object
          properties:
            confirmation_id: { type: string }
            summary: { type: string }
            risk_level: { type: string, enum: [low, medium, high] }
        produced:
          type: object
          properties:
            workflow_id: { type: string }
            dream_policy_id: { type: string }
            artifact_job_id: { type: string }
    WorkflowRef:
      type: object
      additionalProperties: false
      required: [id, version]
      properties:
        id: { type: string, minLength: 1, maxLength: 128, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$' }
        version: { type: integer, minimum: 1 }
    StructuredSignal:
      type: object
      additionalProperties: false
      required: [id, title, detail, severity, evidence_pointer_id]
      properties:
        id: { type: string, minLength: 1, maxLength: 128 }
        title: { type: string, minLength: 1, maxLength: 200 }
        detail: { type: string, minLength: 1, maxLength: 2000 }
        severity: { type: string, enum: [info, warning, critical] }
        evidence_pointer_id: { type: string, minLength: 1, maxLength: 256 }
    Coverage:
      type: object
      additionalProperties: false
      required: [expected_children, completed_children, input_count]
      properties:
        expected_children: { type: integer, minimum: 0 }
        completed_children: { type: integer, minimum: 0 }
        input_count: { type: integer, minimum: 0 }
    MissingInput:
      type: object
      additionalProperties: false
      required: [source_type, source_id, reason]
      properties:
        source_type:
          type: string
          enum: [work_brief, child_dream_summary, project_record, sop_update, agent_answer, external_evidence, completed_task, risk_event]
        source_id: { type: string, minLength: 1, maxLength: 256 }
        reason: { type: string, enum: [not_found, not_completed, not_authorized, failed, masked] }
    InputSnapshotSummary:
      type: object
      additionalProperties: false
      required: [source_counts, sanitized_input_ids]
      properties:
        source_counts:
          type: array
          maxItems: 8
          items:
            type: object
            additionalProperties: false
            required: [source_type, count]
            properties:
              source_type: { type: string, enum: [work_brief, child_dream_summary, project_record, sop_update, agent_answer, external_evidence, completed_task, risk_event] }
              count: { type: integer, minimum: 0 }
        sanitized_input_ids:
          type: array
          maxItems: 1000
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 256 }
    VisibilitySnapshotSummary:
      type: object
      additionalProperties: false
      required: [visibility_level, org_unit_ids, masked_field_count]
      properties:
        visibility_level: { type: string, enum: [members, managers, company_sanitized] }
        org_unit_ids:
          type: array
          maxItems: 1000
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 128 }
        masked_field_count: { type: integer, minimum: 0 }
    DreamPolicyDefinition:
      type: object
      additionalProperties: false
      required:
        - org_unit_id
        - timezone
        - schedule
        - input_sources
        - workflow
        - output_space_id
        - visibility_level
        - confirmation_mode
      properties:
        org_unit_id: { type: string, minLength: 1, maxLength: 128 }
        timezone: { type: string, minLength: 1, maxLength: 128, pattern: '^(UTC|[A-Za-z_]+(?:/[A-Za-z0-9_+.-]+)+)$' }
        schedule: { type: string, minLength: 9, maxLength: 100, pattern: '^\S+(?:\s+\S+){4}$', description: Five-field cron evaluated in the named IANA timezone }
        input_sources:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            type: string
            enum:
              - work_brief
              - child_dream_summary
              - project_record
              - sop_update
              - agent_answer
              - external_evidence
              - completed_task
              - risk_event
            x-enum-varnames:
              - DreamSourceWorkBrief
              - DreamSourceChildDreamSummary
              - DreamSourceProjectRecord
              - DreamSourceSOPUpdate
              - DreamSourceAgentAnswer
              - DreamSourceExternalEvidence
              - DreamSourceCompletedTask
              - DreamSourceRiskEvent
        workflow: { $ref: '#/components/schemas/WorkflowRef' }
        output_space_id: { type: string, minLength: 1, maxLength: 128 }
        visibility_level:
          type: string
          enum: [members, managers, company_sanitized]
          x-enum-varnames: [DreamVisibilityMembers, DreamVisibilityManagers, DreamVisibilityCompanySanitized]
        masking_rules:
          type: array
          default: []
          maxItems: 100
          items: { type: string, minLength: 1, maxLength: 256 }
        risk_signal_rules:
          type: array
          default: []
          maxItems: 100
          items: { type: string, minLength: 1, maxLength: 256 }
        evidence_retention:
          type: string
          enum: [pointer_only, pointer_plus_display_summary]
          default: pointer_only
          x-enum-varnames: [DreamEvidencePointerOnly, DreamEvidencePointerPlusDisplaySummary]
        confirmation_mode:
          type: string
          enum: [always, high_risk_only, never]
          x-enum-varnames: [DreamConfirmationAlways, DreamConfirmationHighRiskOnly, DreamConfirmationNever]
        max_attempts: { type: integer, minimum: 1, maximum: 20, default: 3 }
        allow_partial_children: { type: boolean, default: false }
    DreamSummaryView:
      type: object
      additionalProperties: false
      required:
        - display_summary
        - retrieval_summary
        - sealed_detail_pointer
        - facts
        - themes
        - trends
        - risks
        - todos
        - coverage
        - missing_inputs
        - evidence_pointer_id
      properties:
        display_summary: { type: string, minLength: 1, maxLength: 10000 }
        retrieval_summary: { type: string, minLength: 1, maxLength: 20000 }
        sealed_detail_pointer: { type: string, minLength: 1, maxLength: 512 }
        facts:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        themes:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        trends:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        risks:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        todos:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        coverage: { $ref: '#/components/schemas/Coverage' }
        missing_inputs:
          type: array
          maxItems: 1000
          items: { $ref: '#/components/schemas/MissingInput' }
        evidence_pointer_id: { type: string, minLength: 1, maxLength: 256 }
    DreamRunView:
      type: object
      additionalProperties: false
      required:
        - run_id
        - status
        - org_unit_id
        - window_start
        - window_end
        - policy_version
        - workflow
        - parent_run_ids
        - input_count
        - coverage
        - missing_inputs
        - facts
        - themes
        - trends
        - risks
        - todos
        - display_summary
        - evidence_pointer_id
        - input_snapshot
        - visibility_snapshot
        - model_route
        - model_version
        - attempt
        - idempotency_key
      properties:
        run_id: { type: string, minLength: 1, maxLength: 128 }
        status:
          type: string
          enum: [pending, running, waiting_confirmation, succeeded, failed]
          x-enum-varnames: [DreamRunPending, DreamRunRunning, DreamRunWaitingConfirmation, DreamRunSucceeded, DreamRunFailed]
        org_unit_id: { type: string, minLength: 1, maxLength: 128 }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        policy_version: { type: integer, minimum: 1 }
        workflow: { $ref: '#/components/schemas/WorkflowRef' }
        input_snapshot: { $ref: '#/components/schemas/InputSnapshotSummary' }
        visibility_snapshot: { $ref: '#/components/schemas/VisibilitySnapshotSummary' }
        parent_run_ids:
          type: array
          maxItems: 1000
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 128 }
        input_count: { type: integer, minimum: 0 }
        model_route: { type: string, minLength: 1, maxLength: 128 }
        model_version: { type: string, minLength: 1, maxLength: 128 }
        attempt: { type: integer, minimum: 1, maximum: 20 }
        coverage: { $ref: '#/components/schemas/Coverage' }
        missing_inputs:
          type: array
          maxItems: 1000
          items: { $ref: '#/components/schemas/MissingInput' }
        facts:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        themes:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        trends:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        risks:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        todos:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/StructuredSignal' }
        display_summary: { type: string, minLength: 1, maxLength: 10000 }
        evidence_pointer_id: { type: string, minLength: 1, maxLength: 256 }
        rerun_of_run_id: { type: string, minLength: 1, maxLength: 128 }
        idempotency_key: { type: string, minLength: 1, maxLength: 256 }
    ChangeDraft:
      type: object
      additionalProperties: false
      required:
        - change_id
        - enterprise_id
        - org_unit_id
        - resource_type
        - resource_id
        - action
        - requester_user_id
        - origin
        - permission_mode
        - revision
        - state
        - base_version
        - proposed_content
        - created_at
        - updated_at
      properties:
        change_id: { type: string, minLength: 1, maxLength: 128 }
        enterprise_id: { type: string, minLength: 1, maxLength: 128 }
        org_unit_id: { type: string, minLength: 1, maxLength: 128 }
        resource_type: { type: string, enum: [knowledge_entry, sop, workflow, dream_policy, method_outline] }
        resource_id: { type: string, minLength: 1, maxLength: 128 }
        action: { type: string, enum: [create, update, publish, disable, delete] }
        requester_user_id: { type: string, minLength: 1, maxLength: 128 }
        origin: { type: string, enum: [direct_edit, employee_suggestion] }
        permission_mode: { type: string, enum: [direct_edit, suggestion_only] }
        revision: { type: integer, minimum: 1 }
        state: { type: string, enum: [draft, submitted, approved, rejected, published, withdrawn] }
        base_version: { type: integer, minimum: 0 }
        proposed_content: { type: object, maxProperties: 100, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      oneOf:
        - properties:
            origin: { type: string, enum: [direct_edit] }
            permission_mode: { type: string, enum: [direct_edit] }
        - properties:
            origin: { type: string, enum: [employee_suggestion] }
            permission_mode: { type: string, enum: [suggestion_only] }
            action: { type: string, enum: [create, update, disable, delete] }
    RiskAssessment:
      type: object
      additionalProperties: false
      required: [risk_level, risk_reasons]
      properties:
        risk_level:
          type: string
          enum: [low, high]
          x-enum-varnames: [GovernanceRiskLow, GovernanceRiskHigh]
        risk_reasons:
          type: array
          maxItems: 100
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 256 }
    ReviewRoute:
      type: object
      additionalProperties: false
      required: [change_id, resource_type, resource_id, requester_user_id, risk_level, mode, state, org_path]
      properties:
        change_id: { type: string, minLength: 1, maxLength: 128 }
        resource_type: { type: string, enum: [knowledge_entry, sop, workflow, dream_policy, method_outline] }
        resource_id: { type: string, minLength: 1, maxLength: 128 }
        requester_user_id: { type: string, minLength: 1, maxLength: 128 }
        reviewer_user_id: { type: string, minLength: 1, maxLength: 128 }
        risk_level: { type: string, enum: [low, high] }
        mode:
          type: string
          enum: [single_confirmation, upward_review, enterprise_knowledge_admin_queue]
          x-enum-varnames: [ReviewModeSingleConfirmation, ReviewModeUpwardReview, ReviewModeEnterpriseKnowledgeAdminQueue]
        state: { type: string, enum: [pending, approved, rejected, cancelled] }
        org_path:
          type: array
          maxItems: 100
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 128 }
        queue: { type: string, minLength: 1, maxLength: 128 }
      oneOf:
        - properties:
            mode: { type: string, enum: [single_confirmation] }
            risk_level: { type: string, enum: [low] }
          not:
            anyOf:
              - required: [reviewer_user_id]
              - required: [queue]
        - required: [reviewer_user_id]
          properties:
            mode: { type: string, enum: [upward_review] }
