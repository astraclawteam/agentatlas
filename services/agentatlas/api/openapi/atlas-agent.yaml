openapi: 3.0.3
info:
  title: AgentAtlas Agent Control Plane API
  version: 1.0.0
  description: >
    Agent-first control plane for admins and knowledge owners: Knowledge Agent
    runs, workflow drafts and publication, dream policies, and artifact
    processing jobs. Drafts may be created by the agent; publication always
    requires an explicit human confirmation. Every call authenticates with an
    AgentNexus-issued ticket.
security:
  - NexusTicket: []
paths:
  /auth/login:
    get:
      security: []
      operationId: beginAtlasBrowserLogin
      parameters: [{name: return_to, in: query, schema: {type: string, pattern: '^/[^\\]*$'}}]
      responses: {'302': {description: Full-page redirect to AgentNexus OIDC authorization.}}
  /auth/callback:
    get:
      security: []
      operationId: completeAtlasBrowserLogin
      parameters:
        - {name: state, in: query, required: true, schema: {type: string}}
        - {name: code, in: query, required: true, schema: {type: string}}
      responses: {'302': {description: Opaque Atlas session created and original relative path restored.}}
  /api/session:
    get:
      security: [{AtlasSession: []}]
      operationId: getAtlasBrowserSession
      responses: {'200': {description: Browser identity and sealed scope snapshot, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserSessionView'}}}}, '401': {$ref: '#/components/responses/Unauthorized'}}
  /api/knowledge:
    get:
      security: [{AtlasSession: []}]
      operationId: listBrowserKnowledgeHome
      description: Lists human-readable knowledge content after exact organization authorization by AgentNexus.
      parameters:
        - {name: org_unit_id, in: query, required: true, schema: {type: string, minLength: 1, maxLength: 128}}
        - {name: query, in: query, schema: {type: string, maxLength: 200}}
      responses:
        '200': {description: Bounded knowledge workspace for one authorized organization, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserKnowledgeHome'}}}}
        '400': {description: The search query exceeds the supported length, content: {application/json: {schema: {$ref: '#/components/schemas/InvalidKnowledgeQueryError'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: The selected organization is not authorized.}
        '404': {$ref: '#/components/responses/NotFound'}
        '503': {description: Authorization or safely bounded knowledge data is unavailable.}
  /api/dream/runs:
    get:
      security: [{AtlasSession: []}]
      operationId: listBrowserDreamRuns
      description: Lists immutable Dream runs after exact browser-session organization authorization by AgentNexus.
      parameters:
        - {name: org_unit_id, in: query, required: true, schema: {type: string, minLength: 1, maxLength: 128}}
        - {name: window, in: query, schema: {type: string, format: date}}
      responses:
        '200': {description: Bounded immutable Dream runs, content: {application/json: {schema: {$ref: '#/components/schemas/DreamRunList'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Browser session or AgentNexus denied the exact organization.}
        '503': {description: Authorization or bounded Dream data is unavailable.}
  /api/dream/runs/{id}:
    get:
      security: [{AtlasSession: []}]
      operationId: getBrowserDreamRun
      parameters: [{name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}]
      responses:
        '200': {description: Immutable sanitized Dream run, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamRunView'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Browser session or AgentNexus denied the exact run organization.}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/dream/runs/{id}/annotations:
    post:
      security: [{AtlasSession: []}]
      operationId: annotateBrowserDreamRun
      description: Appends an idempotent governed annotation; immutable Dream output is never edited.
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 256}}
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [action], properties: {action: {type: string, enum: [confirm, reject, mark_incorrect, comment]}, comment: {type: string, maxLength: 4000}}}}}}
      responses: {'201': {description: Annotation appended, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamAnnotation'}}}}, '403': {description: Exact annotation authorization denied.}, '409': {description: Idempotency conflict.}}
  /api/dream/runs/{id}/reruns:
    post:
      security: [{AtlasSession: []}]
      operationId: rerunBrowserDreamRun
      description: Creates an idempotent immutable rerun pinned to the original run window and versions.
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 256}}
      responses: {'202': {description: Rerun scheduled, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamRunHandleResponse'}}}}, '403': {description: Exact rerun authorization denied.}, '409': {description: Idempotency conflict.}}
  /api/dream/runs/{id}/evidence-access:
    post:
      security: [{AtlasSession: []}]
      operationId: accessBrowserDreamEvidence
      description: Requests a resource-bound AgentNexus Step Grant, appends mandatory audit, then returns sanitized detail without raw pointer, grant, or audit identifiers.
      parameters: [{name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}]
      responses:
        '200': {description: Sanitized audited evidence detail, content: {application/json: {schema: {type: object, additionalProperties: false, required: [content_type, sanitized_detail, content_hash], properties: {content_type: {type: string}, sanitized_detail: {type: string, maxLength: 100000}, content_hash: {type: string}}}}}}
        '403': {description: Step Grant or exact organization authorization denied.}
        '503': {description: Authorization, Step Grant, evidence read, or mandatory audit unavailable.}
  /api/dream/policies:
    get:
      security: [{AtlasSession: []}]
      operationId: listBrowserDreamPolicies
      parameters: [{name: org_unit_id, in: query, required: true, schema: {type: string, minLength: 1, maxLength: 128}}]
      responses: {'200': {description: Bounded sanitized lifecycle views, content: {application/json: {schema: {type: object, additionalProperties: false, required: [dream_policies], properties: {dream_policies: {type: array, maxItems: 1000, items: {$ref: '#/components/schemas/BrowserDreamPolicyLifecycle'}}}}}}}, '403': {description: Exact policy read authorization denied.}}
    post:
      security: [{AtlasSession: []}]
      operationId: createBrowserDreamPolicyDraft
      description: Creates an audited governed draft only; this route never publishes.
      parameters: [{name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 256}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamBasicPolicyInput'}}}}
      responses: {'201': {description: Governed Dream policy draft created, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamPolicyLifecycle'}}}}, '403': {description: Exact edit or suggestion authorization denied.}, '409': {description: Idempotency conflict.}, '422': {description: Basic policy input invalid.}}
  /api/dream/workflow-bindings:
    get:
      security: [{AtlasSession: []}]
      operationId: listBrowserDreamWorkflowBindings
      description: Lists human-readable published Dream workflows with opaque session-bound binding handles; workflow and output-space identifiers are never returned.
      parameters: [{name: org_unit_id, in: query, required: true, schema: {type: string, minLength: 1, maxLength: 128}}]
      responses:
        '200': {description: Bounded published Dream workflow bindings, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamWorkflowBindingList'}}}}
        '403': {description: Exact organization authorization denied.}
        '503': {description: Published workflow or authoritative output binding unavailable.}
  /api/dream/policies/{id}:
    put:
      security: [{AtlasSession: []}]
      operationId: updateBrowserDreamPolicyDraft
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamBasicPolicyUpdate'}}}}
      responses: {'200': {description: Draft updated without publication, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamPolicyLifecycle'}}}}, '403': {description: Exact edit authorization denied.}, '409': {description: Revision or idempotency conflict.}}
  /api/dream/policies/{id}/advanced:
    get:
      security: [{AtlasSession: []}]
      operationId: getBrowserDreamAdvancedPolicy
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: X-Atlas-Advanced-Mode, in: header, required: true, schema: {type: string, enum: [enabled]}}
      responses: {'200': {description: Advanced policy fields, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamAdvancedPolicy'}}}}, '403': {description: Advanced entitlement, mode, or exact authorization denied.}}
    put:
      security: [{AtlasSession: []}]
      operationId: updateBrowserDreamAdvancedPolicy
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: X-Atlas-Advanced-Mode, in: header, required: true, schema: {type: string, enum: [enabled]}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamAdvancedPolicy'}}}}
      responses: {'200': {description: Advanced policy draft updated, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamPolicyLifecycle'}}}}, '403': {description: Advanced entitlement, mode, or exact authorization denied.}, '409': {description: Revision or idempotency conflict.}, '422': {description: Invalid advanced policy.}}
  /api/dream/policies/{id}/check:
    post:
      security: [{AtlasSession: []}]
      operationId: checkBrowserDreamPolicyRisk
      parameters: [{name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [revision], properties: {revision: {type: integer, minimum: 0}}}}}}
      responses: {'200': {description: Deterministic risk and changed fields.}, '403': {description: Exact edit authorization denied.}, '409': {description: Stale revision.}}
  /api/dream/policies/{id}/adoptions:
    post:
      security: [{AtlasSession: []}]
      operationId: adoptBrowserDreamPolicySuggestion
      description: Creates a new direct-edit draft from an immutable employee suggestion and records durable source lineage; the source suggestion is never mutated.
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [revision], properties: {revision: {type: integer, minimum: 0}}}}}}
      responses:
        '201': {description: New direct-edit draft created with immutable adoption lineage, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamPolicyLifecycle'}}}}
        '403': {description: Exact edit or organization authorization denied.}
        '409': {description: Suggestion state, revision, concurrency, or idempotency conflict.}
  /api/dream/policies/{id}/review:
    post:
      security: [{AtlasSession: []}]
      operationId: submitBrowserDreamPolicyReview
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [revision, action], properties: {revision: {type: integer, minimum: 0}, action: {type: string, enum: [publish, disable]}}}}}}
      responses: {'200': {description: AgentNexus-bound single-confirmation, upward-review, or admin-queue route recorded.}, '403': {description: Requester, organization, or self-review rule denied.}, '409': {description: Invalid lifecycle state or revision.}}
  /api/dream/policies/{id}/decisions:
    post:
      security: [{AtlasSession: []}]
      operationId: decideBrowserDreamPolicy
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [revision, decision], properties: {revision: {type: integer, minimum: 0}, decision: {type: string, enum: [approve, reject]}, comment: {type: string, maxLength: 4000}}}}}}
      responses: {'200': {description: Assigned decision recorded; publication still separate.}, '403': {description: Wrong reviewer, self-review, permission, or organization denied.}, '409': {description: Invalid lifecycle state or revision.}}
  /api/dream/policies/{id}/publish:
    post:
      security: [{AtlasSession: []}]
      operationId: publishBrowserDreamPolicy
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [revision], properties: {revision: {type: integer, minimum: 0}}}}}}
      responses: {'200': {description: Approved policy version published atomically.}, '403': {description: Exact edit authorization denied.}, '409': {description: Approved decision, valid workflow, revision, or idempotency requirement failed.}}
  /api/dream/policies/{id}/disable:
    post:
      security: [{AtlasSession: []}]
      operationId: disableBrowserDreamPolicy
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [revision], properties: {revision: {type: integer, minimum: 0}}}}}}
      responses: {'200': {description: Approved high-risk disable completed.}, '403': {description: Exact edit authorization denied.}, '409': {description: Approved disable decision or lifecycle requirement failed.}}
  /api/dream/policies/{id}/backfills:
    post:
      security: [{AtlasSession: []}]
      operationId: backfillBrowserDreamPolicy
      parameters:
        - {name: id, in: path, required: true, schema: {$ref: '#/components/schemas/OpaqueDreamHandle'}}
        - {name: X-Atlas-Advanced-Mode, in: header, required: true, schema: {type: string, enum: [enabled]}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamBackfillRequest'}}}}
      responses: {'202': {description: Bounded audited backfill accepted, content: {application/json: {schema: {$ref: '#/components/schemas/BrowserDreamRunHandleResponse'}}}}, '403': {description: Advanced maintenance or exact edit authorization denied.}, '409': {description: Window, lineage, overlap, or idempotency conflict.}}
  /auth/logout:
    post:
      security: [{AtlasSession: []}]
      operationId: logoutAtlasBrowserSession
      responses: {'204': {description: Atlas and AgentNexus sessions revoked.}}
  /api/legacy/knowledge:
    get:
      security: [{AtlasSession: []}]
      operationId: listLegacyKnowledge
      responses: {'200': {$ref: '#/components/responses/LegacyItems'}, '403': {description: Advanced maintenance or organization authorization denied.}, '503': {description: Safe compatibility adapter unavailable.}}
  /api/legacy/dream:
    get:
      security: [{AtlasSession: []}]
      operationId: listLegacyDream
      responses: {'200': {$ref: '#/components/responses/LegacyItems'}, '403': {description: Advanced maintenance or organization authorization denied.}, '503': {description: Safe compatibility adapter unavailable.}}
  /api/legacy/workflows:
    get:
      security: [{AtlasSession: []}]
      operationId: listLegacyWorkflows
      responses: {'200': {$ref: '#/components/responses/LegacyItems'}, '403': {description: Advanced maintenance or organization authorization denied.}, '503': {description: Safe compatibility adapter unavailable.}}
  /api/legacy/evidence:
    get:
      security: [{AtlasSession: []}]
      operationId: listLegacyEvidence
      responses: {'200': {$ref: '#/components/responses/LegacyItems'}, '403': {description: Advanced maintenance or organization authorization denied.}, '503': {description: Safe compatibility adapter unavailable.}}
  /api/legacy/assistant:
    get:
      security: [{AtlasSession: []}]
      operationId: getLegacyAssistant
      responses: {'200': {$ref: '#/components/responses/LegacyItems'}, '403': {description: Advanced maintenance or organization authorization denied.}, '503': {description: Safe compatibility adapter unavailable.}}
  /api/legacy/assistant/attachments:
    post:
      security: [{AtlasSession: []}]
      operationId: uploadLegacyAssistantAttachments
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files: {type: array, maxItems: 20, items: {type: string, format: binary}}
      responses: {'200': {description: Attachments accepted by the secure adapter.}, '403': {description: Advanced maintenance or organization authorization denied.}, '503': {description: Safe attachment adapter unavailable; no file is consumed.}}
  /api/changes/suggestions:
    post:
      security: [{AtlasSession: []}]
      operationId: suggestGovernedChange
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/SuggestionInput'}}}}
      responses: {'201': {description: Suggestion draft, content: {application/json: {schema: {$ref: '#/components/schemas/ChangeDraft'}}}}, '403': {description: Suggestion denied.}}
  /api/changes:
    get:
      security: [{AtlasSession: []}]
      operationId: listGovernedChanges
      parameters:
        - {name: org_unit_id, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100}}
      responses: {'200': {description: Bounded enterprise and organization scoped changes.}}
    post:
      security: [{AtlasSession: []}]
      operationId: createGovernedChangeDraft
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/SuggestionInput'}}}}
      responses: {'201': {description: Direct-edit governed draft, content: {application/json: {schema: {$ref: '#/components/schemas/ChangeDraft'}}}}, '403': {description: Editor permission required.}}
  /api/changes/{id}:
    get:
      security: [{AtlasSession: []}]
      operationId: getGovernedChange
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Governed change.}}
    put:
      security: [{AtlasSession: []}]
      operationId: updateGovernedChange
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateChangeInput'}}}}
      responses:
        '200': {description: Updated revision, content: {application/json: {schema: {$ref: '#/components/schemas/ChangeDraft'}}}}
        '409': {description: Current revision and deterministic diff, content: {application/json: {schema: {$ref: '#/components/schemas/RevisionConflict'}}}}
  /api/changes/{id}/publish:
    post:
      security: [{AtlasSession: []}]
      operationId: publishGovernedChange
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      responses: {'200': {description: Immutable published version, content: {application/json: {schema: {$ref: '#/components/schemas/PublishedChangeVersion'}}}}, '409': {description: Idempotency or revision conflict.}}
  /api/changes/{id}/diff:
    get:
      security: [{AtlasSession: []}]
      operationId: diffGovernedChange
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Deterministic before/after diff, content: {application/json: {schema: {$ref: '#/components/schemas/ChangeDiff'}}}}}
  /api/changes/{id}/assess:
    post:
      security: [{AtlasSession: []}]
      operationId: assessGovernedChange
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Deterministic risk assessment, content: {application/json: {schema: {$ref: '#/components/schemas/RiskAssessment'}}}}}
  /api/changes/{id}/submit:
    post:
      security: [{AtlasSession: []}]
      operationId: submitGovernedChange
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Frozen review route, content: {application/json: {schema: {$ref: '#/components/schemas/ReviewRoute'}}}}}
  /api/changes/{id}/decisions:
    post:
      security: [{AtlasSession: []}]
      operationId: decideGovernedChange
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ChangeDecisionInput'}}}}
      responses: {'204': {description: Review decision recorded.}, '403': {description: Self-review or unauthorized decision rejected.}}
  /v1/agent/runs:
    post:
      operationId: createAgentRun
      summary: Start a Knowledge Agent run from a natural-language goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterprise_id, message]
              properties:
                enterprise_id: { type: string }
                message: { type: string, minLength: 1 }
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      evidence_pointer_id: { type: string }
                      artifact_id: { type: string }
      responses:
        '201':
          description: Run started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/agent/runs/{id}/messages:
    post:
      operationId: postAgentRunMessage
      summary: Continue a Knowledge Agent run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Run advanced
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '404': { $ref: '#/components/responses/NotFound' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, minLength: 1 }
  /v1/agent/runs/{id}/confirmations:
    post:
      operationId: postAgentRunConfirmation
      summary: Resolve a pending human confirmation
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation_id, decision]
              properties:
                confirmation_id: { type: string }
                decision: { type: string, enum: [approve, reject] }
                comment: { type: string }
      responses:
        '200':
          description: Confirmation applied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/workflows:
    get:
      operationId: listWorkflowDrafts
      summary: List bounded workflow drafts for the authenticated enterprise
      responses: {'200': {description: Draft list.}}
    post:
      operationId: createWorkflowDraft
      summary: Create a workflow draft (validated against workflow.schema.json)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterprise_id, workflow]
              properties:
                enterprise_id: { type: string }
                workflow:
                  type: object
                  description: Workflow document conforming to schemas/workflow/workflow.schema.json
      responses:
        '201':
          description: Draft stored
          content:
            application/json:
              schema:
                type: object
                required: [workflow_id, draft_version]
                properties:
                  workflow_id: { type: string }
                  draft_version: { type: integer }
        '422':
          description: Schema validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/workflows/{id}:
    get:
      operationId: getWorkflowDraft
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Workflow draft.}, '404': {$ref: '#/components/responses/NotFound'}}
    put:
      operationId: updateWorkflowDraft
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Updated workflow draft.}, '422': {description: Invalid workflow.}}
  /v1/workflows/{id}/diff:
    get:
      operationId: diffWorkflowDraft
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      responses: {'200': {description: Deterministic draft versus published definition diff.}}
  /v1/workflows/{id}/publish:
    post:
      operationId: publishWorkflow
      summary: Publish an immutable workflow version (human-confirmed)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '201':
          description: Version published
          content:
            application/json:
              schema:
                type: object
                required: [workflow_id, version]
                properties:
                  workflow_id: { type: string }
                  version: { type: integer }
        '409':
          description: Draft unchanged since last publish or draft invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/dream-policies:
    post:
      operationId: createDreamPolicy
      summary: Create a dream policy draft
      parameters: [{name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DreamPolicyDefinition'
      responses:
        '201':
          description: Policy draft stored
          content:
            application/json:
              schema:
                type: object
                required: [dream_policy_id, status, version, revision, requester_user_id, permission_mode, risk_reasons, org_path, policy]
                properties:
                  dream_policy_id: { type: string }
                  status: { type: string, enum: [draft] }
                  version: { type: integer, enum: [0] }
                  revision: { type: integer, minimum: 0 }
                  requester_user_id: { type: string }
                  permission_mode: { type: string, enum: [direct_edit, suggestion_only] }
                  risk_reasons: { type: array, items: { type: string } }
                  org_path: { type: array, items: { type: string } }
                  policy: { $ref: '#/components/schemas/DreamPolicyDefinition' }
    get:
      operationId: listDreamPolicies
      summary: List the enterprise's published dream policies (console policy panel)
      responses:
        '200':
          description: Published policies with decoded definitions
          content:
            application/json:
              schema:
                type: object
                required: [dream_policies]
                properties:
                  dream_policies:
                    type: array
                    items:
                      type: object
                      required: [dream_policy_id, org_scope, status]
                      properties:
                        dream_policy_id: { type: string }
                        org_scope: { type: string }
                        status: { type: string }
                        policy: { $ref: '#/components/schemas/DreamPolicyDefinition' }
  /v1/dream-policies/{id}:
    put:
      operationId: updateDreamPolicyDraft
      summary: Revision-guarded update of a direct-edit Dream policy draft
      parameters: [{name: id, in: path, required: true, schema: {type: string}}, {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [revision, policy], properties: {revision: {type: integer, minimum: 0}, policy: {$ref: '#/components/schemas/DreamPolicyDefinition'}}}}}}
      responses: {'200': {description: Updated draft, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyLifecycle'}}}}, '409': {description: Stale revision or immutable suggestion}}
  /v1/dream-policies/{id}/review:
    post:
      operationId: submitDreamPolicyReview
      summary: Resolve and pin the AgentNexus confirmation or upward-review route
      parameters: [{name: id, in: path, required: true, schema: {type: string}}, {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [revision], properties: {revision: {type: integer, minimum: 0}, action: {type: string, enum: [publish, disable], default: publish}}}}}}
      responses: {'200': {description: Review route pinned, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyLifecycle'}}}}}
  /v1/dream-policies/{id}/check:
    post:
      operationId: checkDreamPolicyRisk
      summary: Deterministically check the current revision without changing state
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyRevision'}}}}
      responses:
        '200':
          description: Risk and changed fields
          content: {application/json: {schema: {type: object, required: [revision, risk_level, risk_reasons, changed_fields], properties: {revision: {type: integer}, risk_level: {type: string, enum: [low, high]}, risk_reasons: {type: array, items: {type: string}}, changed_fields: {type: array, items: {type: string}}}}}}
  /v1/dream-policies/{id}/decisions:
    post:
      operationId: decideDreamPolicy
      summary: Approve or reject the current reviewed revision
      parameters: [{name: id, in: path, required: true, schema: {type: string}}, {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [revision, decision], properties: {revision: {type: integer, minimum: 0}, decision: {type: string, enum: [approve, reject]}, comment: {type: string, maxLength: 4000}}}}}}
      responses: {'200': {description: Decision recorded, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyLifecycle'}}}}}
  /v1/dream-policies/{id}/publish:
    post:
      operationId: publishDreamPolicy
      summary: Atomically publish one approved revision as an immutable version
      parameters: [{name: id, in: path, required: true, schema: {type: string}}, {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyRevision'}}}}
      responses: {'200': {description: Published, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyLifecycle'}}}}}
  /v1/dream-policies/{id}/disable:
    post:
      operationId: disableDreamPolicy
      summary: Revision-guarded disable of a published Dream policy
      parameters: [{name: id, in: path, required: true, schema: {type: string}}, {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyRevision'}}}}
      responses: {'200': {description: Disabled, content: {application/json: {schema: {$ref: '#/components/schemas/DreamPolicyLifecycle'}}}}}
  /v1/dream-policies/{id}/backfills:
    post:
      operationId: backfillDreamPolicy
      summary: Create one audited, idempotent historical Dream window
      parameters: [{name: id, in: path, required: true, schema: {type: string}}, {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 256}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [window_start, window_end]
              properties:
                window_start: {type: string, format: date-time}
                window_end: {type: string, format: date-time}
                rerun_of_run_id: {type: string}
      responses:
        '202':
          description: Immutable backfill run accepted
          content: {application/json: {schema: {type: object, required: [run_id], properties: {run_id: {type: string}}}}}
  /v1/dream/overview:
    get:
      operationId: getDreamOverview
      summary: List immutable Dream run cards for one authorized organization unit
      parameters:
        - { name: org_unit_id, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: Bounded Dream overview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DreamRunList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Missing dream:read or AgentNexus denied the enterprise/organization resource }
        '502': { description: AgentNexus organization authorization failed }
  /v1/dream/runs:
    get:
      operationId: listDreamRuns
      summary: List immutable Dream runs for one authorized organization unit and optional window end date
      parameters:
        - { name: org_unit_id, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: window, in: query, required: false, schema: { type: string, format: date } }
      responses:
        '200':
          description: Bounded Dream run list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DreamRunList' }
        '403': { description: Missing dream:read or AgentNexus denied the enterprise/organization resource }
        '502': { description: AgentNexus organization authorization failed }
  /v1/dream/runs/{id}:
    get:
      operationId: getDreamRun
      summary: Get one immutable enterprise-bound Dream run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: Dream run
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DreamRunView' }
        '404': { $ref: '#/components/responses/NotFound' }
        '403': { description: Missing dream:read or AgentNexus denied the run's enterprise/organization resource }
        '502': { description: AgentNexus organization authorization failed }
  /v1/dream/runs/{id}/annotations:
    post:
      operationId: annotateDreamRun
      summary: Append a governed annotation without changing the immutable Dream output
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [action]
              properties:
                action: { type: string, enum: [confirm, reject, mark_incorrect, comment], x-enum-varnames: [AnnotateDreamRunJSONBodyActionConfirm, AnnotateDreamRunJSONBodyActionReject, AnnotateDreamRunJSONBodyActionMarkIncorrect, AnnotateDreamRunJSONBodyActionComment] }
                comment: { type: string, maxLength: 4000 }
      responses:
        '201': { description: Annotation appended }
        '403': { description: Annotation permission denied }
        '502': { description: AgentNexus organization authorization failed }
  /v1/dream/runs/{id}/reruns:
    post:
      operationId: rerunDreamRun
      summary: Create an immutable manual rerun pinned to the original window and versions
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 1, maxLength: 256 } }
      responses:
        '202': { description: Rerun scheduled }
        '403': { description: Missing dream:rerun or AgentNexus denied the run's enterprise/organization resource }
        '409': { description: Canonical idempotency conflict }
        '502': { description: AgentNexus organization authorization failed }
  /v1/dream/runs/{id}/evidence-access:
    post:
      operationId: accessDreamEvidence
      summary: Read sanitized sealed detail through a resource-bound AgentNexus Step Grant and mandatory audit
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: Audited, grant-bound sanitized detail
          content:
            application/json:
              schema:
                type: object
                required: [grant_id, audit_ref_id, content_type, sanitized_detail, content_hash]
                properties:
                  grant_id: { type: string }
                  audit_ref_id: { type: string }
                  content_type: { type: string }
                  sanitized_detail: { type: string, maxLength: 100000 }
                  content_hash: { type: string }
        '403': { description: Missing dream:evidence:read or AgentNexus denied the bound read }
        '502': { description: AgentNexus organization authorization or evidence lookup/read failed }
  /v1/method-outlines:
    post:
      operationId: createMethodOutline
      summary: Import a method outline (方法大纲 — flexible method structure, indexed for retrieval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, outline]
              properties:
                title: { type: string }
                outline: { type: object, description: Sections/steps of arbitrary nesting }
                org_scope: { type: string }
      responses:
        '201':
          description: Outline stored and queued for indexing
          content:
            application/json:
              schema:
                type: object
                required: [method_outline_id, title]
                properties:
                  method_outline_id: { type: string }
                  title: { type: string }
                  org_scope: { type: string }
    get:
      operationId: listMethodOutlines
      summary: List the enterprise's method outlines
      responses:
        '200':
          description: Outlines newest-first
          content:
            application/json:
              schema:
                type: object
                required: [method_outlines]
                properties:
                  method_outlines:
                    type: array
                    items:
                      type: object
                      required: [method_outline_id, title]
                      properties:
                        method_outline_id: { type: string }
                        title: { type: string }
                        org_scope: { type: string }
                        outline: { type: object }
                        created_at: { type: string, format: date-time }
  /v1/workflows/{id}/runs:
    post:
      operationId: startWorkflowRun
      summary: Register a pending run for a published version and enqueue it for atlas-worker
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: integer, minimum: 1 }
                input: { type: object, description: Run input visible to input.* nodes }
      responses:
        '202':
          description: Run registered and enqueued
          content:
            application/json:
              schema:
                type: object
                required: [run_id, status]
                properties:
                  run_id: { type: string }
                  status: { type: string, enum: [pending] }
components:
  securitySchemes:
    NexusTicket:
      type: apiKey
      in: header
      name: X-Nexus-Ticket
    AtlasSession:
      type: apiKey
      in: cookie
      name: atlas_session
  responses:
    LegacyItems:
      description: Bounded legacy items visible in the authorized organization scope.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [items]
            properties:
              items:
                type: array
                maxItems: 100
                items:
                  type: object
                  additionalProperties: false
                  required: [id, label]
                  properties:
                    id: {type: string}
                    label: {type: string}
                    detail: {type: string}
    Unauthorized:
      description: Missing or invalid ticket (fail closed)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found in caller-visible scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    BrowserSessionView:
      type: object
      additionalProperties: false
      required: [authenticated, enterprise_id, enterprise_name, enterprise_user_id, display_name, org_version, org_unit_ids, org_tree, permissions]
      properties:
        authenticated: {type: boolean}
        enterprise_id: {type: string}
        enterprise_name: {type: string, minLength: 1}
        enterprise_user_id: {type: string}
        display_name: {type: string}
        org_version: {type: integer, format: int64}
        org_unit_ids: {type: array, maxItems: 1000, items: {type: string}}
        org_tree: {type: array, maxItems: 1000, items: {$ref: '#/components/schemas/BrowserOrgScopeNode'}}
        permissions: {type: array, maxItems: 100, items: {type: string}}
        advanced_mode_allowed: {type: boolean}
        idle_expires_at: {type: string, format: date-time}
        absolute_expires_at: {type: string, format: date-time}
    BrowserOrgScopeNode:
      type: object
      additionalProperties: false
      required: [id, name, selectable, children]
      properties:
        id: {type: string}
        name: {type: string, minLength: 1}
        selectable: {type: boolean}
        children: {type: array, maxItems: 1000, items: {$ref: '#/components/schemas/BrowserOrgScopeNode'}}
    BrowserKnowledgeHome:
      type: object
      additionalProperties: false
      required: [organization, status, counts, items]
      properties:
        organization:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name: {type: string, minLength: 1, maxLength: 256}
        status:
          type: object
          additionalProperties: false
          required: [knowledge_runtime, freshness_label]
          properties:
            knowledge_runtime: {type: string, enum: [running, checking]}
            freshness_label: {type: string, minLength: 1, maxLength: 64}
        counts:
          type: object
          additionalProperties: false
          required: [available, recent_changes, reviews]
          properties:
            available: {type: boolean}
            recent_changes: {type: integer, nullable: true, minimum: 0, maximum: 100}
            reviews: {type: integer, nullable: true, minimum: 0, maximum: 100}
        items:
          type: array
          maxItems: 100
          items: {$ref: '#/components/schemas/BrowserKnowledgeItem'}
    BrowserKnowledgeItem:
      type: object
      additionalProperties: false
      required: [key, title, type_label, updated_label, scope_label]
      properties:
        key: {type: string, minLength: 1, maxLength: 256, description: Opaque navigation key; never presented as user-facing copy.}
        title: {type: string, minLength: 1, maxLength: 10000}
        type_label: {type: string, enum: [SOP, 资料, 知识摘要, 知识说明]}
        updated_label: {type: string, minLength: 1, maxLength: 64}
        scope_label: {type: string, minLength: 1, maxLength: 256}
    SuggestionInput:
      type: object
      additionalProperties: false
      required: [org_unit_id, resource_type, resource_id, action, proposed_content]
      properties:
        org_unit_id: {type: string}
        resource_type: {type: string, enum: [knowledge_entry, sop, workflow, dream_policy, method_outline]}
        resource_id: {type: string}
        action: {type: string, enum: [create, update, publish, disable, delete]}
        base_version: {type: integer, minimum: 0}
        proposed_content: {type: object, maxProperties: 100, additionalProperties: true}
    UpdateChangeInput:
      type: object
      additionalProperties: false
      required: [revision, proposed_content]
      properties:
        revision: {type: integer, minimum: 1}
        proposed_content: {type: object, maxProperties: 100, additionalProperties: true}
    ChangeDecisionInput:
      type: object
      additionalProperties: false
      required: [decision]
      properties:
        decision: {type: string, enum: [approve, reject]}
        comment: {type: string, maxLength: 4000}
    ChangeDiff:
      type: object
      additionalProperties: false
      required: [before, after]
      properties:
        before: {type: object, nullable: true, maxProperties: 100, additionalProperties: true}
        after: {type: object, maxProperties: 100, additionalProperties: true}
    RevisionConflict:
      type: object
      additionalProperties: false
      required: [error, current_revision, diff]
      properties:
        error: {type: string, enum: [revision_conflict]}
        current_revision: {type: integer, minimum: 1}
        diff: {$ref: '#/components/schemas/ChangeDiff'}
    PublishedChangeVersion:
      type: object
      additionalProperties: false
      required: [change_id, resource_id, version, audit_ref_id]
      properties:
        change_id: {type: string}
        resource_id: {type: string}
        version: {type: integer, minimum: 1}
        audit_ref_id: {type: string}
    OpaqueDreamHandle:
      type: string
      minLength: 32
      maxLength: 4096
      description: Opaque, encrypted, browser-session-family-bound Dream resource handle.
    BrowserDreamRunHandleResponse:
      type: object
      additionalProperties: false
      required: [handle]
      properties:
        handle: {$ref: '#/components/schemas/OpaqueDreamHandle'}
    BrowserDreamBackfillRequest:
      type: object
      additionalProperties: false
      required: [window_start, window_end]
      properties:
        window_start: {type: string, format: date-time}
        window_end: {type: string, format: date-time}
        rerun_handle: {$ref: '#/components/schemas/OpaqueDreamHandle'}
    BrowserDreamAdvancedPolicy:
      type: object
      additionalProperties: false
      required: [revision, timezone, schedule, masking_rules, risk_signal_rules, evidence_retention, max_attempts, allow_partial_children]
      properties:
        revision: {type: integer, minimum: 0}
        timezone: {type: string, minLength: 1, maxLength: 100}
        schedule: {type: string, minLength: 1, maxLength: 200}
        masking_rules: {type: array, maxItems: 100, items: {type: string, maxLength: 1000}}
        risk_signal_rules: {type: array, maxItems: 100, items: {type: string, maxLength: 1000}}
        evidence_retention: {type: string, enum: [pointer_only, pointer_plus_display_summary]}
        max_attempts: {type: integer, minimum: 1, maximum: 20}
        allow_partial_children: {type: boolean}
    BrowserDreamWorkflowBinding:
      type: object
      additionalProperties: false
      required: [handle, name, version_label, output_name]
      properties:
        handle: {$ref: '#/components/schemas/OpaqueDreamHandle'}
        name: {type: string, maxLength: 200}
        version_label: {type: string, maxLength: 100}
        output_name: {type: string, maxLength: 200}
    BrowserDreamWorkflowBindingList:
      type: object
      additionalProperties: false
      required: [bindings]
      properties:
        bindings:
          type: array
          maxItems: 100
          items: {$ref: '#/components/schemas/BrowserDreamWorkflowBinding'}
    DreamRunList:
      type: object
      additionalProperties: false
      required: [runs]
      properties:
        runs:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/BrowserDreamRunView' }
    BrowserDreamSignal:
      type: object
      additionalProperties: false
      required: [title, detail, severity]
      properties:
        title: {type: string, maxLength: 200}
        detail: {type: string, maxLength: 2000}
        severity: {type: string, enum: [info, warning, critical]}
    BrowserDreamRunView:
      type: object
      additionalProperties: false
      required: [handle, status, window_start, window_end, input_count, coverage, missing_input_reasons, facts, themes, trends, risks, todos, display_summary, rerun]
      properties:
        handle: {$ref: '#/components/schemas/OpaqueDreamHandle'}
        status: {type: string, enum: [pending, running, waiting_confirmation, succeeded, failed]}
        window_start: {type: string, format: date-time}
        window_end: {type: string, format: date-time}
        input_count: {type: integer, minimum: 0}
        coverage: {$ref: '#/components/schemas/Coverage'}
        missing_input_reasons: {type: array, maxItems: 1000, items: {type: string, maxLength: 200}}
        facts: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/BrowserDreamSignal'}}
        themes: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/BrowserDreamSignal'}}
        trends: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/BrowserDreamSignal'}}
        risks: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/BrowserDreamSignal'}}
        todos: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/BrowserDreamSignal'}}
        display_summary: {type: string, maxLength: 10000}
        rerun: {type: boolean}
        organization_name: {type: string, maxLength: 200}
        rerun_relation: {type: string, maxLength: 200}
        failure_stage: {type: string, maxLength: 100}
        annotations: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/BrowserDreamAnnotation'}}
        input_organizations: {type: array, maxItems: 100, items: {$ref: '#/components/schemas/BrowserDreamLineage'}}
        downstream_organizations: {type: array, maxItems: 100, items: {$ref: '#/components/schemas/BrowserDreamLineage'}}
    BrowserDreamAnnotation:
      type: object
      additionalProperties: false
      required: [action, actor_name]
      properties:
        action: {type: string, enum: [confirm, reject, mark_incorrect, comment]}
        comment: {type: string, maxLength: 4000}
        actor_name: {type: string, maxLength: 200}
        created_at: {type: string, format: date-time}
    BrowserDreamLineage:
      type: object
      additionalProperties: false
      required: [organization_name, relation]
      properties:
        organization_name: {type: string, maxLength: 200}
        relation: {type: string, maxLength: 100}
        handle: {$ref: '#/components/schemas/OpaqueDreamHandle'}
    BrowserDreamPolicyLifecycle:
      type: object
      additionalProperties: false
      required: [handle, status, revision, version, permission_mode, risk_reasons, cadence, input_sources, visibility, confirmation, can_adopt, can_decide]
      properties:
        handle: {$ref: '#/components/schemas/OpaqueDreamHandle'}
        status: {type: string, enum: [draft, review_pending, approved, rejected, published, disabled]}
        revision: {type: integer, minimum: 0}
        version: {type: integer, minimum: 0}
        permission_mode: {type: string, enum: [direct_edit, suggestion_only]}
        risk_level: {type: string, enum: [low, high]}
        risk_reasons: {type: array, maxItems: 100, items: {type: string, maxLength: 200}}
        review_mode: {type: string, enum: [single_confirmation, upward_review, enterprise_knowledge_admin_queue]}
        pending_action: {type: string, enum: [publish, disable]}
        review_state: {type: string, enum: [pending, approved, rejected]}
