openapi: 3.0.3
info:
  title: AgentAtlas Agent Control Plane API
  version: 1.0.0
  description: >
    Agent-first control plane for admins and knowledge owners: Knowledge Agent
    runs, workflow drafts and publication, dream policies, and artifact
    processing jobs. Drafts may be created by the agent; publication always
    requires an explicit human confirmation. Every call authenticates with an
    AgentNexus-issued ticket.
security:
  - NexusTicket: []
paths:
  /v1/agent/runs:
    post:
      operationId: createAgentRun
      summary: Start a Knowledge Agent run from a natural-language goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterprise_id, message]
              properties:
                enterprise_id: { type: string }
                message: { type: string, minLength: 1 }
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      evidence_pointer_id: { type: string }
                      artifact_id: { type: string }
      responses:
        '201':
          description: Run started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/agent/runs/{id}/messages:
    post:
      operationId: postAgentRunMessage
      summary: Continue a Knowledge Agent run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Run advanced
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '404': { $ref: '#/components/responses/NotFound' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, minLength: 1 }
  /v1/agent/runs/{id}/confirmations:
    post:
      operationId: postAgentRunConfirmation
      summary: Resolve a pending human confirmation
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation_id, decision]
              properties:
                confirmation_id: { type: string }
                decision: { type: string, enum: [approve, reject] }
                comment: { type: string }
      responses:
        '200':
          description: Confirmation applied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRun' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/workflows:
    post:
      operationId: createWorkflowDraft
      summary: Create a workflow draft (validated against workflow.schema.json)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterprise_id, workflow]
              properties:
                enterprise_id: { type: string }
                workflow:
                  type: object
                  description: Workflow document conforming to schemas/workflow/workflow.schema.json
      responses:
        '201':
          description: Draft stored
          content:
            application/json:
              schema:
                type: object
                required: [workflow_id, draft_version]
                properties:
                  workflow_id: { type: string }
                  draft_version: { type: integer }
        '422':
          description: Schema validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/workflows/{id}/publish:
    post:
      operationId: publishWorkflow
      summary: Publish an immutable workflow version (human-confirmed)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '201':
          description: Version published
          content:
            application/json:
              schema:
                type: object
                required: [workflow_id, version]
                properties:
                  workflow_id: { type: string }
                  version: { type: integer }
        '409':
          description: Draft unchanged since last publish or draft invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/dream-policies:
    post:
      operationId: createDreamPolicy
      summary: Create a dream policy draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DreamPolicyDraft'
      responses:
        '201':
          description: Policy draft stored
          content:
            application/json:
              schema:
                type: object
                required: [dream_policy_id, status]
                properties:
                  dream_policy_id: { type: string }
                  status: { type: string, enum: [draft, published] }
    get:
      operationId: listDreamPolicies
      summary: List the enterprise's published dream policies (console policy panel)
      responses:
        '200':
          description: Published policies with decoded definitions
          content:
            application/json:
              schema:
                type: object
                required: [dream_policies]
                properties:
                  dream_policies:
                    type: array
                    items:
                      type: object
                      required: [dream_policy_id, org_scope, status]
                      properties:
                        dream_policy_id: { type: string }
                        org_scope: { type: string }
                        status: { type: string }
                        policy: { type: object }
  /v1/method-outlines:
    post:
      operationId: createMethodOutline
      summary: Import a method outline (方法大纲 — flexible method structure, indexed for retrieval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, outline]
              properties:
                title: { type: string }
                outline: { type: object, description: Sections/steps of arbitrary nesting }
                org_scope: { type: string }
      responses:
        '201':
          description: Outline stored and queued for indexing
          content:
            application/json:
              schema:
                type: object
                required: [method_outline_id, title]
                properties:
                  method_outline_id: { type: string }
                  title: { type: string }
                  org_scope: { type: string }
    get:
      operationId: listMethodOutlines
      summary: List the enterprise's method outlines
      responses:
        '200':
          description: Outlines newest-first
          content:
            application/json:
              schema:
                type: object
                required: [method_outlines]
                properties:
                  method_outlines:
                    type: array
                    items:
                      type: object
                      required: [method_outline_id, title]
                      properties:
                        method_outline_id: { type: string }
                        title: { type: string }
                        org_scope: { type: string }
                        outline: { type: object }
                        created_at: { type: string, format: date-time }
  /v1/workflows/{id}/runs:
    post:
      operationId: startWorkflowRun
      summary: Register a pending run for a published version and enqueue it for atlas-worker
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: integer, minimum: 1 }
                input: { type: object, description: Run input visible to input.* nodes }
      responses:
        '202':
          description: Run registered and enqueued
          content:
            application/json:
              schema:
                type: object
                required: [run_id, status]
                properties:
                  run_id: { type: string }
                  status: { type: string, enum: [pending] }
components:
  securitySchemes:
    NexusTicket:
      type: apiKey
      in: header
      name: X-Nexus-Ticket
  responses:
    Unauthorized:
      description: Missing or invalid ticket (fail closed)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found in caller-visible scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    AgentRun:
      type: object
      required: [run_id, enterprise_id, status]
      properties:
        run_id: { type: string }
        enterprise_id: { type: string }
        status: { type: string, enum: [running, waiting_confirmation, completed, failed] }
        reply: { type: string }
        pending_confirmation:
          type: object
          properties:
            confirmation_id: { type: string }
            summary: { type: string }
            risk_level: { type: string, enum: [low, medium, high] }
        produced:
          type: object
          properties:
            workflow_id: { type: string }
            dream_policy_id: { type: string }
            artifact_job_id: { type: string }
    DreamPolicyDraft:
      type: object
      required: [enterprise_id, org_scope, schedule, input_sources, visibility_level, output_space_id]
      properties:
        enterprise_id: { type: string }
        org_scope: { type: string }
        schedule: { type: string, description: Cron expression evaluated in the enterprise timezone }
        input_sources:
          type: array
          items: { type: string, enum: [work_briefs, project_records, sop_updates, agent_answers, external_evidence] }
        visibility_level: { type: string, enum: [members, managers, company_sanitized] }
        masking_rules:
          type: array
          items: { type: string }
        risk_signal_rules:
          type: array
          items: { type: string }
        evidence_retention: { type: string, enum: [pointer_only, pointer_plus_display_summary] }
        output_space_id: { type: string }
        retry_policy:
          type: object
          properties:
            max_attempts: { type: integer, default: 3 }
            backoff_seconds: { type: integer, default: 300 }
