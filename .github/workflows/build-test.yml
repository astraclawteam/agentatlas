# AgentAtlas — build and test the open-core artifacts.
#
# Reusable (workflow_call) rather than copied into each caller. The PR gate and
# the release gate must run the SAME steps: the defect this gate exists to
# prevent (cdb22d9 — a Dockerfile that could build none of the five services
# while the whole test suite stayed green) is a drift defect, and two hand-kept
# copies of these steps would reproduce that class of failure inside the gate
# itself. Callers: pr.yml (pull_request) and release.yml (tags).

name: build-test

on:
  workflow_call:
    secrets:
      AGENTNEXUS_READ_TOKEN:
        description: >-
          Read access to astraclawteam/agentnexus, needed for the sibling
          checkout every Go command in services/agentatlas depends on.
        # Deliberately not `required: true`. A missing secret must surface as
        # the named preflight failure below, which says what to configure,
        # rather than as an opaque actions/checkout 404.
        required: false

permissions:
  contents: read

env:
  GOFLAGS: "-buildvcs=false"

jobs:
  # ---------------------------------------------------------------------------
  # Go: the SDK module and the service module.
  #
  # services/agentatlas/go.mod:115 replaces
  # github.com/astraclawteam/agentnexus/sdk/go/runtime with the relative path
  # ../../../agentnexus/sdk/go/runtime, and 20+ files import it. That makes a
  # SIBLING agentnexus checkout a prerequisite for every Go command in this
  # module — `go build ./...`, `go test ./...` and the container build alike,
  # not just the container build. Checked out alone, the module fails with
  #   replacement directory ../../../agentnexus/sdk/go/runtime does not exist
  # for all 5 cmd/ and 14 internal/ packages. The prerequisite disappears when
  # the SDK becomes a published module; see the DECISION NOTE in
  # services/agentatlas/deploy/docker/Dockerfile.
  # ---------------------------------------------------------------------------
  go:
    runs-on: ubuntu-latest
    steps:
      - name: preflight - AGENTNEXUS_READ_TOKEN must be configured
        env:
          NEXUS_TOKEN: ${{ secrets.AGENTNEXUS_READ_TOKEN }}
        run: |
          if [ -z "$NEXUS_TOKEN" ]; then
            echo "::error title=AGENTNEXUS_READ_TOKEN is not configured::This repository needs a secret named AGENTNEXUS_READ_TOKEN carrying read access to astraclawteam/agentnexus. services/agentatlas/go.mod replaces the AgentNexus runtime SDK with a relative path into a sibling agentnexus checkout, so no Go command in that module can run without it. See services/agentatlas/deploy/README.md."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          path: agentatlas

      - uses: actions/checkout@v4
        with:
          repository: astraclawteam/agentnexus
          path: agentnexus
          token: ${{ secrets.AGENTNEXUS_READ_TOKEN }}

      - name: preflight - the sibling checkout must carry the runtime SDK
        run: |
          if [ ! -f agentnexus/sdk/go/runtime/go.mod ]; then
            echo "::error title=agentnexus sibling checkout is incomplete::agentnexus/sdk/go/runtime/go.mod is missing. The checkout succeeded but did not produce the module services/agentatlas/go.mod replaces, so every Go command below would fail with a replacement-directory error instead of naming this cause."
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            agentatlas/sdk/go/go.sum
            agentatlas/services/agentatlas/go.sum

      - name: sdk - build and test
        working-directory: agentatlas/sdk/go
        run: go build ./... && go test ./... -count=1

      - name: service - build
        working-directory: agentatlas/services/agentatlas
        run: go build ./...

      # The pinned red below is EXCLUDED here and asserted separately. -skip
      # takes the exact subtest, so the other two subtests of the same parent
      # test still run and are still enforced by this step; only the one
      # deliberately-failing leaf is held out.
      - name: service - test suite
        working-directory: agentatlas/services/agentatlas
        run: |
          go test ./... -count=1 \
            -skip 'TestAccessTicketVerificationHasNoFrozenCounterpart/ticketGuard_can_resolve_the_actor_behind_an_Access_Ticket'

      # -------------------------------------------------------------------
      # PINNED RED — task-board #25.
      #
      # This subtest fails ON PURPOSE and is expected to keep failing. It pins
      # a real cross-repo contract gap: the frozen AgentNexus contract has no
      # operation that verifies an Access Ticket and returns an actor
      # (POST /v1/tickets/verify is verifyStepGrant, whose response carries a
      # Step Grant's binding and no actor identity). Closing it is a contract
      # decision in agentnexus, not a client change, so the test is not skipped
      # away — its failure is the signal, and this step asserts the signal is
      # still there.
      #
      # Inverted deliberately: if it ever PASSES, this step fails and says to
      # close #25 and delete the pin. The two extra guards below stop the pin
      # from silently absorbing anything else — a compile error or a different
      # failure in the package does not count as "the pin is holding".
      # -------------------------------------------------------------------
      - name: pinned red - the access-ticket contract gap must still be open
        working-directory: agentatlas/services/agentatlas
        run: |
          PIN='TestAccessTicketVerificationHasNoFrozenCounterpart/ticketGuard_can_resolve_the_actor_behind_an_Access_Ticket'

          log=$(mktemp)
          go test ./internal/nexusclient/ -run "$PIN" -count=1 >"$log" 2>&1 && status=0 || status=$?
          cat "$log"

          if grep -q "no tests to run" "$log"; then
            echo "::error title=Pinned red is gone::${PIN} no longer exists under that name. If task-board #25 was closed, delete this step and the -skip in the suite step above; otherwise restore the test."
            exit 1
          fi

          if [ "$status" -eq 0 ]; then
            echo "::error title=Pinned red now passes::${PIN} was expected to FAIL (task-board #25: the frozen AgentNexus contract has no operation that verifies an Access Ticket and returns an actor). It now passes, so the gap it pins may be closed. Close #25, then delete this step and the -skip in the suite step above."
            exit 1
          fi

          if ! grep -q -- "--- FAIL: ${PIN}" "$log"; then
            echo "::error title=nexusclient failed for a different reason::The package did not pass, but not by failing ${PIN}. This pin must never absorb an unrelated failure. Read the log above."
            exit 1
          fi

          echo "pinned red confirmed: ${PIN} fails as expected (task-board #25)"

      # The frozen contract's digest pin is a core invariant of this system;
      # drifting it silently has already caused one revert. The snapshot digest
      # itself is asserted by TestPublishedGatewayRuntimeDigest, which runs in
      # the suite step above; this target adds the contract/schema parity tests.
      - name: contract verification
        working-directory: agentatlas/services/agentatlas
        run: make verify-contracts

  # ---------------------------------------------------------------------------
  # Console. Installed from the REPOSITORY ROOT: pnpm-lock.yaml and
  # pnpm-workspace.yaml live there, so a frozen-lockfile install is only
  # meaningful from the workspace root.
  # ---------------------------------------------------------------------------
  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: test
        run: pnpm -r test
      # `build` runs `tsc --noEmit` before vite. Keeping it in the gate is the
      # point: the console typecheck was broken by a missing @types/node and
      # nothing caught it, because this command had never run in CI.
      - name: build
        run: pnpm -r build

  # ---------------------------------------------------------------------------
  # Container build. The only check that fails when the image build breaks —
  # `go build` and `go test` both pass on a machine that has the sibling
  # checkout, which is exactly how the Dockerfile stayed unbuildable for all
  # five services with a green suite until cdb22d9.
  # ---------------------------------------------------------------------------
  container:
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4
        with:
          path: agentatlas
      - uses: actions/checkout@v4
        with:
          repository: astraclawteam/agentnexus
          path: agentnexus
          token: ${{ secrets.AGENTNEXUS_READ_TOKEN }}
      - name: container-build-check
        run: make -C agentatlas/services/agentatlas docker-build-check
